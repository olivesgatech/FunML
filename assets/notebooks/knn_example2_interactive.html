<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive k-NN Example 2</title>
  <style>
    :root {
      --bg: #f8fafc;
      --ink: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --blue: #1d4ed8;
      --red: #dc2626;
      --purple: #7e22ce;
      --amber: #b45309;
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #fff;
    }
    body {
      padding: 14px;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0 0 10px;
      color: var(--muted);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      margin: 10px 0 14px;
    }
    .controls label {
      font-size: 14px;
      color: var(--ink);
    }
    .controls input[type="range"] {
      width: 180px;
    }
    canvas {
      width: 100%;
      max-width: 940px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: block;
      background: #fff;
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.4;
    }
    .status code {
      background: #f1f5f9;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive k-NN Example 2 (Manhattan Distance)</h1>
    <p>Click in the plot to move point F. Toggle the outlier E and adjust k to see sensitivity.</p>
    <div class="controls">
      <label for="kRange">k neighbors:</label>
      <input id="kRange" type="range" min="1" max="5" step="1" value="3">
      <strong id="kValue">3</strong>
      <label for="includeOutlier">
        <input id="includeOutlier" type="checkbox" checked>
        include outlier E
      </label>
    </div>
    <canvas id="plot" width="940" height="560"></canvas>
    <div class="status" id="status"></div>
  </div>

  <script>
    const basePoints = [
      { name: "A", x: 1.2, y: 2.8, cls: 0, outlier: false },
      { name: "B", x: 3.7, y: 4.1, cls: 0, outlier: false },
      { name: "C", x: 6.2, y: 5.0, cls: 1, outlier: false },
      { name: "D", x: 7.5, y: 3.8, cls: 1, outlier: false },
      { name: "E", x: 7.2, y: 4.7, cls: 0, outlier: true },
    ];
    let newPoint = { x: 7.5, y: 4.5, name: "F" };

    const canvas = document.getElementById("plot");
    const ctx = canvas.getContext("2d");
    const kRange = document.getElementById("kRange");
    const kValue = document.getElementById("kValue");
    const includeOutlier = document.getElementById("includeOutlier");
    const status = document.getElementById("status");

    const plotArea = { left: 70, top: 25, right: 900, bottom: 500 };
    const xMin = 0, xMax = 8, yMin = 2, yMax = 6;

    function activePoints() {
      return includeOutlier.checked
        ? basePoints
        : basePoints.filter((p) => !p.outlier);
    }

    function toPxX(x) {
      return plotArea.left + (x - xMin) * (plotArea.right - plotArea.left) / (xMax - xMin);
    }
    function toPxY(y) {
      return plotArea.bottom - (y - yMin) * (plotArea.bottom - plotArea.top) / (yMax - yMin);
    }
    function toDataX(px) {
      return xMin + (px - plotArea.left) * (xMax - xMin) / (plotArea.right - plotArea.left);
    }
    function toDataY(py) {
      return yMin + (plotArea.bottom - py) * (yMax - yMin) / (plotArea.bottom - plotArea.top);
    }

    function drawCross(x, y, color, size) {
      const px = toPxX(x);
      const py = toPxY(y);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(px - size, py - size);
      ctx.lineTo(px + size, py + size);
      ctx.moveTo(px + size, py - size);
      ctx.lineTo(px - size, py + size);
      ctx.stroke();
    }

    function classify(point, k) {
      const distances = activePoints()
        .map((p) => ({
          ...p,
          d: Math.abs(point.x - p.x) + Math.abs(point.y - p.y),
        }))
        .sort((a, b) => a.d - b.d);

      const neighbors = distances.slice(0, Math.max(1, Math.min(k, distances.length)));
      let c0 = 0, c1 = 0;
      neighbors.forEach((n) => {
        if (n.cls === 0) c0 += 1;
        else c1 += 1;
      });
      let pred = 0;
      if (c1 > c0) pred = 1;
      else if (c0 === c1) pred = neighbors[0].cls;
      return { pred, neighbors, c0, c1 };
    }

    function drawAxes() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      for (let x = 0; x <= 8; x += 1) {
        const px = toPxX(x);
        ctx.beginPath();
        ctx.moveTo(px, plotArea.top);
        ctx.lineTo(px, plotArea.bottom);
        ctx.stroke();
      }
      for (let y = 2; y <= 6; y += 1) {
        const py = toPxY(y);
        ctx.beginPath();
        ctx.moveTo(plotArea.left, py);
        ctx.lineTo(plotArea.right, py);
        ctx.stroke();
      }

      ctx.strokeStyle = "#334155";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(plotArea.left, plotArea.bottom);
      ctx.lineTo(plotArea.right, plotArea.bottom);
      ctx.lineTo(plotArea.right, plotArea.top);
      ctx.stroke();

      ctx.fillStyle = "#0f172a";
      ctx.font = "14px Arial";
      for (let x = 0; x <= 8; x += 1) {
        ctx.fillText(String(x), toPxX(x) - 4, plotArea.bottom + 20);
      }
      for (let y = 2; y <= 6; y += 1) {
        ctx.fillText(String(y), plotArea.left - 22, toPxY(y) + 5);
      }

      ctx.font = "18px Arial";
      ctx.fillText("X-axis", (plotArea.left + plotArea.right) / 2 - 24, 545);
      ctx.save();
      ctx.translate(20, (plotArea.top + plotArea.bottom) / 2 + 20);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText("Y-axis", 0, 0);
      ctx.restore();
    }

    function drawLegend() {
      const x = plotArea.left + 10;
      const y = plotArea.top + 10;
      const w = 230;
      const h = 110;
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#cbd5e1";
      ctx.lineWidth = 1;
      ctx.fillRect(x, y, w, h);
      ctx.strokeRect(x, y, w, h);

      const rows = [
        { label: "Class 0", color: "#1d4ed8" },
        { label: "Class 1", color: "#dc2626" },
        { label: "New Point (F)", color: "#7e22ce" },
        { label: "Outlier E", color: "#b45309" },
      ];
      rows.forEach((row, i) => {
        const cy = y + 20 + i * 22;
        ctx.strokeStyle = row.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x + 12, cy - 7);
        ctx.lineTo(x + 26, cy + 7);
        ctx.moveTo(x + 26, cy - 7);
        ctx.lineTo(x + 12, cy + 7);
        ctx.stroke();
        ctx.fillStyle = "#0f172a";
        ctx.font = "15px Arial";
        ctx.fillText(row.label, x + 40, cy + 5);
      });
    }

    function syncKMax() {
      const maxK = activePoints().length;
      kRange.max = String(maxK);
      if (Number(kRange.value) > maxK) {
        kRange.value = String(maxK);
      }
    }

    function render() {
      syncKMax();
      const k = Number(kRange.value);
      kValue.textContent = String(k);

      drawAxes();
      drawLegend();

      activePoints().forEach((p) => {
        const color = p.outlier ? "#b45309" : (p.cls === 0 ? "#1d4ed8" : "#dc2626");
        drawCross(p.x, p.y, color, 9);
        ctx.fillStyle = "#1f2937";
        ctx.font = "14px Arial";
        const suffix = p.outlier ? " (outlier)" : "";
        ctx.fillText(`${p.name}${suffix}`, toPxX(p.x) + 10, toPxY(p.y) - 10);
      });

      const result = classify(newPoint, k);
      const predColor = result.pred === 0 ? "#1d4ed8" : "#dc2626";
      drawCross(newPoint.x, newPoint.y, "#7e22ce", 10);
      ctx.fillStyle = "#1f2937";
      ctx.font = "16px Arial";
      ctx.fillText("F", toPxX(newPoint.x) + 12, toPxY(newPoint.y) - 14);

      ctx.strokeStyle = "#94a3b8";
      ctx.lineWidth = 1.5;
      result.neighbors.forEach((n) => {
        ctx.beginPath();
        ctx.moveTo(toPxX(newPoint.x), toPxY(newPoint.y));
        ctx.lineTo(toPxX(n.x), toPxY(n.y));
        ctx.stroke();
      });

      const neighborText = result.neighbors
        .map((n) => `${n.name} (${n.cls === 0 ? "C0" : "C1"}: ${n.d.toFixed(2)})`)
        .join(", ");
      status.innerHTML =
        `Predicted class for <code>F (${newPoint.x.toFixed(2)}, ${newPoint.y.toFixed(2)})</code>: ` +
        `<strong style="color:${predColor}">${result.pred === 0 ? "Class 0" : "Class 1"}</strong>. ` +
        `${includeOutlier.checked ? "Including" : "Excluding"} outlier E. ` +
        `Neighbors: ${neighborText}.`;
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    canvas.addEventListener("click", (ev) => {
      const rect = canvas.getBoundingClientRect();
      const px = ev.clientX - rect.left;
      const py = ev.clientY - rect.top;
      if (px < plotArea.left || px > plotArea.right || py < plotArea.top || py > plotArea.bottom) {
        return;
      }
      newPoint = {
        name: "F",
        x: clamp(toDataX(px), xMin, xMax),
        y: clamp(toDataY(py), yMin, yMax),
      };
      render();
    });

    kRange.addEventListener("input", render);
    includeOutlier.addEventListener("change", render);
    render();
  </script>
</body>
</html>
