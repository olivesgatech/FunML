<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Hinge Loss Family</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { --line:#cbd5e1; --ink:#0f172a; --muted:#475569; --bg:#f8fafc; }
    html,body{margin:0;padding:0;background:#fff;font-family:"Segoe UI",Arial,sans-serif;color:var(--ink)}
    body{padding:14px}
    .wrap{max-width:1100px;margin:0 auto}
    h1{margin:0 0 8px;font-size:24px}
    p{margin:0 0 12px;color:var(--muted)}
    .controls{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin:10px 0 14px}
    .control{border:1px solid var(--line);border-radius:12px;padding:10px;background:linear-gradient(180deg,#fff,var(--bg))}
    .control label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
    .row{display:flex;align-items:center;gap:8px}
    .row input[type="range"]{flex:1}
    .value{min-width:44px;text-align:right;font-weight:700}
    .plot{height:520px;border:1px solid var(--line);border-radius:12px}
    @media (max-width:960px){.controls{grid-template-columns:1fr 1fr}.plot{height:460px}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive Hinge Loss Family</h1>
    <p>Covers hinge loss, softplus approximation, and subgradient using score form <code>s = θᵀx - b</code> with bias <code>b</code>.</p>

    <div class="controls">
      <div class="control">
        <label for="view">Figure</label>
        <select id="view">
          <option>Hinge loss</option>
          <option>Hinge vs Softplus</option>
          <option>Subgradient</option>
        </select>
      </div>
      <div class="control">
        <label for="b">Bias b</label>
        <div class="row"><input id="b" type="range" min="-2" max="2" step="0.1" value="0"><span class="value" id="bVal">0.0</span></div>
      </div>
      <div class="control">
        <label for="m">Margin</label>
        <div class="row"><input id="m" type="range" min="0" max="2" step="0.1" value="0"><span class="value" id="mVal">0.0</span></div>
      </div>
      <div class="control">
        <label for="t">Softplus τ</label>
        <div class="row"><input id="t" type="range" min="0.05" max="1.5" step="0.05" value="0.3"><span class="value" id="tVal">0.30</span></div>
      </div>
    </div>

    <div id="plot" class="plot"></div>
  </div>

  <script>
    const viewEl = document.getElementById('view');
    const bEl = document.getElementById('b');
    const mEl = document.getElementById('m');
    const tEl = document.getElementById('t');
    const bVal = document.getElementById('bVal');
    const mVal = document.getElementById('mVal');
    const tVal = document.getElementById('tVal');

    const x = Array.from({length: 600}, (_, i) => -3 + 6 * i / 599);

    function hinge(score, y, margin) {
      return score.map(s => Math.max(0, margin - y * s));
    }

    function softplus(score, y, margin, tau) {
      const tt = Math.max(tau, 1e-8);
      return score.map(s => tt * Math.log1p(Math.exp((margin - y * s) / tt)));
    }

    function subgrad(score, y, margin) {
      return score.map(s => (margin - y * s > 0 ? -y : 0));
    }

    function draw() {
      const view = viewEl.value;
      const b = Number(bEl.value);
      const margin = Number(mEl.value);
      const tau = Number(tEl.value);
      bVal.textContent = b.toFixed(1);
      mVal.textContent = margin.toFixed(1);
      tVal.textContent = tau.toFixed(2);

      const score = x.map(v => v - b);
      const labels = [1, -1];
      const colors = {1: '#2563eb', '-1': '#dc2626'};
      const traces = [];
      const curveValues = [];
      let title = '';
      let yaxis = 'loss';

      if (view === 'Hinge loss') {
        labels.forEach(y => {
          const curve = hinge(score, y, margin);
          curveValues.push(...curve);
          traces.push({x, y: curve, mode:'lines', name:`Hinge y=${y > 0 ? '+1' : '-1'}`, line:{color:colors[y], width:3}});
        });
        title = 'Hinge Loss with Bias: s = θᵀx - b';
      } else if (view === 'Hinge vs Softplus') {
        labels.forEach(y => {
          const h = hinge(score, y, margin);
          const sp = softplus(score, y, margin, tau);
          curveValues.push(...h, ...sp);
          traces.push({x, y: h, mode:'lines', name:`Hinge y=${y > 0 ? '+1' : '-1'}`, line:{color:colors[y], width:3}});
          traces.push({x, y: sp, mode:'lines', name:`Softplus y=${y > 0 ? '+1' : '-1'}`, line:{color:colors[y], width:3, dash:'dash'}});
        });
        title = 'Hinge vs Softplus with Bias: s = θᵀx - b';
      } else {
        labels.forEach(y => {
          const h = hinge(score, y, margin);
          const sg = subgrad(score, y, margin);
          curveValues.push(...h, ...sg);
          traces.push({x, y: h, mode:'lines', name:`Hinge y=${y > 0 ? '+1' : '-1'}`, line:{color:colors[y], width:3, dash:'dash'}});
          traces.push({x, y: sg, mode:'lines', name:`Subgrad y=${y > 0 ? '+1' : '-1'}`, line:{color:colors[y], width:3}});
        });
        yaxis = 'hinge / subgradient';
        title = 'Hinge Subgradient with Bias: s = θᵀx - b';
      }

      const yMin = Math.min(...curveValues);
      const yMax = Math.max(...curveValues);
      const pad = Math.max(0.2, 0.08 * Math.max(yMax - yMin, 1));
      const guideMin = yMin - pad;
      const guideMax = yMax + pad;

      traces.push({x:[b,b], y:[guideMin,guideMax], mode:'lines', name:'θᵀx = b', line:{color:'#64748b', dash:'dot'}});
      labels.forEach(y => {
        const kink = b + margin / y;
        traces.push({x:[kink,kink], y:[guideMin,guideMax], mode:'lines', name:`kink y=${y > 0 ? '+1' : '-1'}`, line:{color:colors[y], dash:'dot'}});
      });

      Plotly.newPlot('plot', traces, {
        margin:{l:60,r:20,t:50,b:55},
        title,
        xaxis:{title:'θᵀx'},
        yaxis:{title:yaxis},
        legend:{orientation:'h', y:1.12, font:{size:11}}
      }, {displayModeBar:false, responsive:true});
    }

    [viewEl,bEl,mEl,tEl].forEach(el => el.addEventListener('input', draw));
    draw();
  </script>
</body>
</html>
