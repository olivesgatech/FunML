<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Interactive Precision and Recall vs Decision Threshold</title>
  <script src="plotly-2.35.2.min.js"></script>
  <style>
    :root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#ffffff;--blue:#2563eb;--green:#16a34a}
    html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
    body{padding:14px}
    .wrap{max-width:1000px;margin:0 auto}
    h1{margin:0 0 6px;font-size:24px}
    p{margin:0 0 12px;color:var(--muted)}
    .controls{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px 16px;margin:12px 0 14px}
    .control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
    .control label{font-size:14px;font-weight:600}
    .row{display:flex;align-items:center;gap:10px}
    .row input[type=range]{flex:1}
    .value{min-width:74px;text-align:right;font-weight:700}
    .plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
    .plot{width:100%;height:500px}
    .status{margin-top:12px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
    @media(max-width:860px){.controls{grid-template-columns:1fr}.plot{height:420px}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive Precision and Recall vs Decision Threshold</h1>
    <p>Figure 6.5: move the decision threshold and observe how precision increases while recall decreases.</p>

    <div class="controls">
      <div class="control">
        <label>Decision threshold</label>
        <div class="row">
          <input id="thr" type="range" min="-700000" max="700000" step="5000" value="0">
          <span class="value" id="thrVal">0</span>
        </div>
      </div>
      <div class="control">
        <label>Class overlap (noise scale)</label>
        <div class="row">
          <input id="noise" type="range" min="60000" max="300000" step="5000" value="150000">
          <span class="value" id="noiseVal">150000</span>
        </div>
      </div>
    </div>

    <div class="plot-card"><div id="curve" class="plot"></div></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    let scores = [], labels = [];

    function randn(){
      let u = 0, v = 0;
      while (u === 0) u = Math.random();
      while (v === 0) v = Math.random();
      return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
    }

    function generateData(){
      const sigma = Number(noise.value);
      const n = 600;
      const muPos = 180000;
      const muNeg = -180000;
      scores = [];
      labels = [];
      for (let i=0;i<n;i++){ scores.push(muPos + sigma*randn()); labels.push(1); }
      for (let i=0;i<n;i++){ scores.push(muNeg + sigma*randn()); labels.push(0); }
    }

    function metricsAtThreshold(t){
      let tp=0, fp=0, fn=0;
      for (let i=0;i<scores.length;i++){
        const pred = scores[i] >= t ? 1 : 0;
        if (labels[i] === 1 && pred === 1) tp++;
        else if (labels[i] === 0 && pred === 1) fp++;
        else if (labels[i] === 1 && pred === 0) fn++;
      }
      const precision = (tp + fp) ? tp/(tp+fp) : 1;
      const recall = (tp + fn) ? tp/(tp+fn) : 0;
      return {precision, recall, tp, fp, fn};
    }

    function render(){
      const tNow = Number(thr.value);
      const sigma = Number(noise.value);
      thrVal.textContent = tNow.toLocaleString();
      noiseVal.textContent = sigma.toLocaleString();

      const tMin = -700000, tMax = 700000, steps = 220;
      const ths = [], prs = [], rcs = [];
      for (let i=0;i<=steps;i++){
        const t = tMin + (tMax - tMin)*i/steps;
        const m = metricsAtThreshold(t);
        ths.push(t);
        prs.push(m.precision);
        rcs.push(m.recall);
      }

      Plotly.newPlot('curve', [
        {x: ths, y: prs, name: 'Precision', mode: 'lines', line: {color: '#2563eb', dash: 'dash', width: 3}},
        {x: ths, y: rcs, name: 'Recall', mode: 'lines', line: {color: '#16a34a', width: 3}}
      ], {
        title: 'Precision and Recall as Functions of the Decision Threshold',
        xaxis: {title: 'Threshold', range: [-700000, 700000], dtick: 200000},
        yaxis: {title: 'Metric value', range: [0, 1], dtick: 0.2},
        shapes: [{type:'line', x0:tNow, x1:tNow, y0:0, y1:1, line:{color:'#111827', width:2, dash:'dot'}}],
        margin: {l:70, r:20, t:60, b:65},
        legend: {x: 0.03, y: 0.98}
      }, {displayModeBar:false, responsive:true});

      const mNow = metricsAtThreshold(tNow);
      status.textContent =
        `Threshold = ${tNow.toLocaleString()}\n` +
        `Precision = ${mNow.precision.toFixed(3)}\n` +
        `Recall = ${mNow.recall.toFixed(3)}\n` +
        `TP = ${mNow.tp}, FP = ${mNow.fp}, FN = ${mNow.fn}`;
    }

    function rebuildAndRender(){
      generateData();
      render();
    }

    thr.oninput = render;
    noise.oninput = rebuildAndRender;

    rebuildAndRender();
  </script>
</body>
</html>
