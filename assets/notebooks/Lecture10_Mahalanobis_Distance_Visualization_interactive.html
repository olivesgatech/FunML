<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Interactive Sigma Control (Lecture 10)</title><script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script><style>
:root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#fff;--a:#2563eb;--b:#dc2626;--c:#059669}
html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
body{padding:14px}.wrap{max-width:1200px;margin:0 auto}h1{margin:0 0 8px;font-size:24px}p{margin:0 0 12px;color:var(--muted)}
.controls{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px 16px;margin:14px 0 16px}
.control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
.control label{font-size:14px;font-weight:600}.row{display:flex;align-items:center;gap:10px}.row input[type=range]{flex:1}.value{min-width:56px;text-align:right;font-weight:700}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 16px}button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600}
button:hover{background:var(--bg)}.plots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
.plot{width:100%;height:460px}.status{margin-top:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
@media(max-width:980px){.controls{grid-template-columns:repeat(2,minmax(0,1fr))}.plots{grid-template-columns:1fr}.plot{height:380px}}
.controls{grid-template-columns:1fr 1fr 1fr}</style></head><body><div class="wrap"><h1>Interactive Sigma Control (Lecture 10)</h1><p>Edit points and vary covariance Sigma for Euclidean vs Mahalanobis comparison.</p><div class="controls" style="grid-template-columns:1fr 1fr 1fr;"><div class="control" style="grid-column:1 / span 3"><label>Points (x,y; x,y; ...)</label><div class="row"><input id="pts" type="text" value="0,0; 1,1; 2,0.5; -1,1.6; -2,-0.8" style="width:100%"></div></div><div class="control"><label>sigma_x</label><div class="row"><input id="sx" type="range" min="0.2" max="3" step="0.1" value="1"><span class="value" id="sxv">1.0</span></div></div><div class="control"><label>sigma_y</label><div class="row"><input id="sy" type="range" min="0.2" max="3" step="0.1" value="1"><span class="value" id="syv">1.0</span></div></div><div class="control"><label>rho</label><div class="row"><input id="rho" type="range" min="-0.95" max="0.95" step="0.05" value="0"><span class="value" id="rhov">0.00</span></div></div></div><div class="plots"><div class="plot-card"><div id="p" class="plot"></div></div><div class="plot-card"><div id="tbl" class="plot"></div></div></div><div class="status" id="status"></div></div><script>function parsePts(s){return s.split(';').map(v=>v.trim()).filter(Boolean).map(v=>v.split(',').map(Number)).filter(a=>a.length===2&&!Number.isNaN(a[0])&&!Number.isNaN(a[1]))}
function eig2(a,b,c){const tr=a+c,det=a*c-b*b,disc=Math.sqrt(Math.max(tr*tr-4*det,0)); return [(tr+disc)/2,(tr-disc)/2]}
function render(){const pts=parsePts(ptsEl.value); if(!pts.length){status.textContent='Invalid points format.'; return;} const q=[0,0]; const sx=+sxEl.value, sy=+syEl.value, rho=+rhoEl.value; sxv.textContent=sx.toFixed(1);syv.textContent=sy.toFixed(1);rhov.textContent=rho.toFixed(2);
const cov=[[sx*sx,rho*sx*sy],[rho*sx*sy,sy*sy]]; const det=cov[0][0]*cov[1][1]-cov[0][1]*cov[1][0] || 1e-9; const inv=[[cov[1][1]/det,-cov[0][1]/det],[-cov[1][0]/det,cov[0][0]/det]];
const de=[],dm=[]; for(const p of pts){const dx=p[0]-q[0], dy=p[1]-q[1]; de.push(Math.hypot(dx,dy)); dm.push(Math.sqrt(dx*(inv[0][0]*dx+inv[0][1]*dy)+dy*(inv[1][0]*dx+inv[1][1]*dy)));}
const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]); const t=[...Array(240)].map((_,i)=>2*Math.PI*i/239); const [l1,l2]=eig2(cov[0][0],cov[0][1],cov[1][1]); const ang=0.5*Math.atan2(2*cov[0][1],cov[0][0]-cov[1][1]); const ex=t.map(tt=>Math.sqrt(Math.max(l1,1e-9))*Math.cos(tt)); const ey=t.map(tt=>Math.sqrt(Math.max(l2,1e-9))*Math.sin(tt)); const elx=ex.map((u,i)=>u*Math.cos(ang)-ey[i]*Math.sin(ang)); const ely=ex.map((u,i)=>u*Math.sin(ang)+ey[i]*Math.cos(ang));
Plotly.newPlot('p',[{x:xs,y:ys,mode:'markers+text',text:pts.map((_,i)=>String(i+1)),textposition:'top center',marker:{size:10,color:'#2563eb'},name:'points'},{x:[0],y:[0],mode:'markers',marker:{size:14,color:'#dc2626',symbol:'x'},name:'query'},{x:elx,y:ely,mode:'lines',line:{dash:'dash',color:'black'},name:'1-sigma'}],{title:'Sigma effect on distances',xaxis:{scaleanchor:'y'}},{displayModeBar:false});
Plotly.newPlot('tbl',[{type:'table',header:{values:['Point','Euclidean','Mahalanobis']},cells:{values:[pts.map((_,i)=>i+1),de.map(v=>v.toFixed(3)),dm.map(v=>v.toFixed(3))]}}],{title:'Distance table'},{displayModeBar:false});
status.textContent='Query point fixed at (0,0). Adjust Sigma to see anisotropic distance changes.'}
const ptsEl=pts,sxEl=sx,syEl=sy,rhoEl=rho; [pts,sx,sy,rho].forEach(el=>el.addEventListener('input',render)); render();</script></body></html>
