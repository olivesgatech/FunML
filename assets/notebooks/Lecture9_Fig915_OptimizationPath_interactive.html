<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="plotly-2.35.2.min.js"></script>
  <style>
    :root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#fff;--blue:#2563eb;--red:#dc2626;--green:#059669;--gold:#d97706;--purple:#7c3aed}
    html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
    body{padding:14px}
    .wrap{max-width:1240px;margin:0 auto}
    h1{margin:0 0 6px;font-size:24px}
    p{margin:0 0 12px;color:var(--muted)}
    .controls{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px 16px;margin:14px 0 16px}
    .control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
    .control label{font-size:14px;font-weight:600}
    .row{display:flex;align-items:center;gap:10px}
    .row input[type=range]{flex:1}
    .value{min-width:56px;text-align:right;font-weight:700}
    .plots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .plots.wide{grid-template-columns:1fr}
    .plots.quad{grid-template-columns:repeat(2,minmax(0,1fr))}
    .plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
    .plot{width:100%;height:430px}
    .plot.short{height:300px}
    .status{margin-top:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
    @media(max-width:980px){
      .controls{grid-template-columns:repeat(2,minmax(0,1fr))}
      .plots,.plots.quad{grid-template-columns:1fr}
      .plot{height:360px}
    }
  </style>
</head>
<body>
<div class="wrap"><h1>Figure 9.15: Geometric Intuition for L1, L2, and Elastic Net</h1><p>Constraint shape changes where the loss contours are touched and how the path approaches the optimum.</p><div class="controls"><div class="control"><label>Constraint scale</label><div class="row"><input id="scale" type="range" min="0.60" max="2.20" step="0.05" value="1.25"><span class="value" id="scalev">1.25</span></div></div><div class="control"><label>Mix ρ</label><div class="row"><input id="rho" type="range" min="0.00" max="1.00" step="0.05" value="0.35"><span class="value" id="rhov">0.35</span></div></div><div class="control"><label>Path steps</label><div class="row"><input id="steps" type="range" min="4" max="24" step="1" value="12"><span class="value" id="stepsv">12</span></div></div><div class="control"><label>Path scale</label><div class="row"><input id="path" type="range" min="0.20" max="1.20" step="0.05" value="0.60"><span class="value" id="pathv">0.60</span></div></div></div><div class="plots quad"><div class="plot-card"><div id="p1" class="plot short"></div></div><div class="plot-card"><div id="p2" class="plot short"></div></div><div class="plot-card"><div id="p3" class="plot short"></div></div><div class="plot-card"><div id="p4" class="plot short"></div></div></div><div class="status" id="status"></div></div><script>
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function randn(rng){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function linspace(a,b,n){if(n===1)return[a];const step=(b-a)/(n-1);return Array.from({length:n},(_,i)=>a+i*step)}
function polyval(theta,x){let s=0,p=1;for(let i=0;i<theta.length;i++){s+=theta[i]*p;p*=x}return s}
function designRow(x,deg){const row=new Array(deg+1);let p=1;for(let i=0;i<=deg;i++){row[i]=p;p*=x}return row}
function solve(A,b){
  const n=A.length, M=A.map(r=>r.slice()), y=b.slice();
  for(let i=0;i<n;i++){
    let piv=i;
    for(let r=i+1;r<n;r++) if(Math.abs(M[r][i])>Math.abs(M[piv][i])) piv=r;
    if(piv!==i){[M[i],M[piv]]=[M[piv],M[i]];[y[i],y[piv]]=[y[piv],y[i]]}
    const div=Math.abs(M[i][i])<1e-10?(M[i][i] < 0 ? -1e-10 : 1e-10):M[i][i];
    for(let c=i;c<n;c++) M[i][c]/=div;
    y[i]/=div;
    for(let r=0;r<n;r++){
      if(r===i) continue;
      const f=M[r][i];
      for(let c=i;c<n;c++) M[r][c]-=f*M[i][c];
      y[r]-=f*y[i];
    }
  }
  return y;
}
function ridgeFit(x,y,deg,lam){
  const m=deg+1, A=Array.from({length:m},()=>Array(m).fill(0)), b=Array(m).fill(0);
  for(let i=0;i<x.length;i++){
    const row=designRow(x[i],deg);
    for(let r=0;r<m;r++){
      b[r]+=row[r]*y[i];
      for(let c=0;c<m;c++) A[r][c]+=row[r]*row[c];
    }
  }
  for(let i=1;i<m;i++) A[i][i]+=lam;
  return solve(A,b);
}
function mseFromTheta(theta,x,y){let s=0;for(let i=0;i<x.length;i++){const e=polyval(theta,x[i])-y[i];s+=e*e}return s/x.length}
function baseCurve(x){return 1 + 0.7*x - 0.35*x*x + 0.06*x*x*x}
function makePolyData(seed,n,obsNoise,gtNoise){
  const rng=mulberry32(seed), x=linspace(-3,3,n);
  const yTrue=x.map(v=>baseCurve(v));
  const yStar=yTrue.map(v=>v + gtNoise*randn(rng));
  const y=yStar.map(v=>v + obsNoise*randn(rng));
  return {x,y,yTrue,yStar};
}
function ordinaryLeastSquaresLine(x,y){
  const n=x.length, mx=x.reduce((a,b)=>a+b,0)/n, my=y.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  for(let i=0;i<n;i++){num+=(x[i]-mx)*(y[i]-my);den+=(x[i]-mx)*(x[i]-mx)}
  const slope=den===0?0:num/den, intercept=my-slope*mx;
  return [intercept,slope];
}
function setValue(id, text){document.getElementById(id).textContent=text}


function contourField(){
  const xs=linspace(-2.6,2.6,80), ys=linspace(-2.4,2.4,80), Z=[];
  for(let j=0;j<ys.length;j++){
    const row=[];
    for(let i=0;i<xs.length;i++){
      const x=xs[i], y=ys[j];
      row.push(0.7*(x-0.8)*(x-0.8) + 1.25*(y-0.2)*(y-0.2) + 0.35*(x-0.8)*(y-0.2));
    }
    Z.push(row);
  }
  return {xs,ys,Z};
}
function l1Diamond(scale){return {x:[0,scale,0,-scale,0], y:[scale,0,-scale,0,scale]}}
function l2Circle(scale){const t=linspace(0,2*Math.PI,181); return {x:t.map(v=>scale*Math.cos(v)), y:t.map(v=>scale*Math.sin(v))}}
function elasticShape(scale,rho){
  const t=linspace(0,2*Math.PI,181), p=1.15 + 1.5*(1-rho);
  return {x:t.map(v=>scale*Math.sign(Math.cos(v))*Math.pow(Math.abs(Math.cos(v)),2/p)), y:t.map(v=>scale*Math.sign(Math.sin(v))*Math.pow(Math.abs(Math.sin(v)),2/p))}
}
function pathPoints(target, steps, scale){
  const pts=[[2.0,1.8]];
  for(let k=1;k<steps;k++){
    const prev=pts[pts.length-1];
    pts.push([
      prev[0] + scale*(target[0]-prev[0]),
      prev[1] + scale*(target[1]-prev[1])
    ]);
  }
  return {x:pts.map(p=>p[0]), y:pts.map(p=>p[1])};
}
function panel(divId, title, shape, optimum, path, color){
  const field=contourField();
  Plotly.newPlot(divId,[
    {x:field.xs,y:field.ys,z:field.Z,type:'contour',showscale:false,colorscale:'Viridis',contours:{showlabels:false}},
    {x:shape.x,y:shape.y,mode:'lines',name:'constraint',line:{color:'#111827',width:2}},
    {x:[optimum[0]],y:[optimum[1]],mode:'markers',name:'optimum',marker:{color:color,size:10,symbol:'diamond'}},
    {x:path.x,y:path.y,mode:'lines+markers',name:'path',line:{color:color,width:3},marker:{size:6,color:color}}
  ], {title, margin:{t:38,l:38,r:10,b:32}, xaxis:{range:[-2.6,2.6],zeroline:true}, yaxis:{range:[-2.4,2.4],zeroline:true,scaleanchor:'x'}}, {displayModeBar:false,responsive:true});
}
function render(){
  const scale=+scaleEl.value, rho=+rhoEl.value, steps=+stepsEl.value, pathScale=+pathEl.value;
  setValue('scalev', scale.toFixed(2)); setValue('rhov', rho.toFixed(2)); setValue('stepsv', steps); setValue('pathv', pathScale.toFixed(2));
  panel('p1','L1 geometry', l1Diamond(scale), [0.0, scale*0.72], pathPoints([0.15, scale*0.68], steps, pathScale), '#dc2626');
  panel('p2','Lasso path', l1Diamond(scale), [0.0, scale*0.72], pathPoints([0.0, scale*0.72], steps, pathScale), '#dc2626');
  panel('p3','L2 geometry', l2Circle(scale), [scale*0.72, scale*0.38], pathPoints([scale*0.72, scale*0.38], steps, pathScale), '#2563eb');
  panel('p4','Elastic Net path', elasticShape(scale, rho), [scale*0.55, scale*0.36], pathPoints([scale*0.55, scale*0.36], steps, pathScale), '#7c3aed');
  document.getElementById('status').textContent='Corners in the L1 geometry encourage axis-aligned optima. Smooth L2 geometry shrinks parameters without forcing exact zeros, and Elastic Net interpolates between them.';
}
const scaleEl=document.getElementById('scale'), rhoEl=document.getElementById('rho'), stepsEl=document.getElementById('steps'), pathEl=document.getElementById('path');
['scale','rho','steps','path'].forEach(id=>document.getElementById(id).addEventListener('input', render));
render();

</script></body></html>
