<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Logistic Regression and NLL Landscape</title>
  <script src="plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --ink: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --panel: #ffffff;
      --accent: #dc2626;
      --accent-2: #2563eb;
      --accent-3: #059669;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    body {
      padding: 14px;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 12px 16px;
      margin: 14px 0 16px;
    }
    .control {
      display: grid;
      gap: 6px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }
    .control label {
      font-size: 14px;
      font-weight: 600;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control input[type="range"] {
      flex: 1;
    }
    .value {
      min-width: 56px;
      text-align: right;
      font-weight: 700;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 16px;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover {
      background: var(--bg);
    }
    .plots {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
    }
    .plot-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      overflow: hidden;
    }
    .plot {
      width: 100%;
      height: 520px;
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      font-size: 14px;
    }
    code {
      background: #eef2ff;
      padding: 2px 5px;
      border-radius: 4px;
    }
    @media (max-width: 960px) {
      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .plots {
        grid-template-columns: 1fr;
      }
      .plot {
        height: 460px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive Logistic Regression Models and NLL Landscape</h1>
    <p>Adjust the dataset and model parameters, or snap to the minimum-NLL solution.</p>

    <div class="controls">
      <div class="control">
        <label for="weightRange">Weight w</label>
        <div class="control-row">
          <input id="weightRange" type="range" min="-3" max="3" step="0.01" value="1.73">
          <span class="value" id="weightValue">1.73</span>
        </div>
      </div>
      <div class="control">
        <label for="biasRange">Bias b</label>
        <div class="control-row">
          <input id="biasRange" type="range" min="-3" max="3" step="0.01" value="-2.64">
          <span class="value" id="biasValue">-2.64</span>
        </div>
      </div>
      <div class="control">
        <label for="noiseRange">Noise scale</label>
        <div class="control-row">
          <input id="noiseRange" type="range" min="0.1" max="3" step="0.1" value="1.5">
          <span class="value" id="noiseValue">1.5</span>
        </div>
      </div>
      <div class="control">
        <label for="thresholdRange">Decision threshold</label>
        <div class="control-row">
          <input id="thresholdRange" type="range" min="-1" max="3" step="0.1" value="1.0">
          <span class="value" id="thresholdValue">1.0</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="optimalButton" type="button">Use minimum-NLL model</button>
      <button id="regenerateButton" type="button">Regenerate data</button>
      <button id="resetButton" type="button">Reset demo</button>
    </div>

    <div class="plots">
      <div class="plot-card"><div class="plot" id="modelPlot"></div></div>
      <div class="plot-card"><div class="plot" id="lossPlot"></div></div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const weightRange = document.getElementById("weightRange");
    const biasRange = document.getElementById("biasRange");
    const noiseRange = document.getElementById("noiseRange");
    const thresholdRange = document.getElementById("thresholdRange");
    const weightValue = document.getElementById("weightValue");
    const biasValue = document.getElementById("biasValue");
    const noiseValue = document.getElementById("noiseValue");
    const thresholdValue = document.getElementById("thresholdValue");
    const status = document.getElementById("status");
    const optimalButton = document.getElementById("optimalButton");
    const regenerateButton = document.getElementById("regenerateButton");
    const resetButton = document.getElementById("resetButton");

    const xValues = Array.from({ length: 100 }, (_, i) => -5 + (10 * i) / 99);
    const basePatterns = [];
    [-2, -1, 0, 1, 2].forEach((w) => {
      [-2, -1, 0, 1, 2].forEach((b) => {
        basePatterns.push({ w, b });
      });
    });
    const wValues = Array.from({ length: 100 }, (_, i) => -3 + (6 * i) / 99);
    const bValues = Array.from({ length: 100 }, (_, i) => -3 + (6 * i) / 99);

    let randomSeed = 0;
    let dataState = null;
    let modelInitialized = false;
    let lossInitialized = false;

    function sigmoid(z) {
      return 1 / (1 + Math.exp(-z));
    }

    function mulberry32(seed) {
      return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randomNormal(rand) {
      let u = 0;
      let v = 0;
      while (u === 0) u = rand();
      while (v === 0) v = rand();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    function format(value) {
      return Number(value).toFixed(2);
    }

    function generateDataset(noiseScale, threshold, seed) {
      const rand = mulberry32(seed);
      const yValues = xValues.map((x) => (x + randomNormal(rand) * noiseScale > threshold ? 1 : 0));

      const nllGrid = [];
      let minNll = Infinity;
      let optimalW = 0;
      let optimalB = 0;

      for (const b of bValues) {
        const row = [];
        for (const w of wValues) {
          let sum = 0;
          for (let i = 0; i < xValues.length; i += 1) {
            const p = Math.min(Math.max(sigmoid(w * xValues[i] + b), 1e-6), 1 - 1e-6);
            const y = yValues[i];
            sum += -(y * Math.log(p) + (1 - y) * Math.log(1 - p));
          }
          const nll = sum / xValues.length;
          row.push(nll);
          if (nll < minNll) {
            minNll = nll;
            optimalW = w;
            optimalB = b;
          }
        }
        nllGrid.push(row);
      }

      return { yValues, nllGrid, minNll, optimalW, optimalB, noiseScale, threshold, seed };
    }

    function currentNll(w, b) {
      let sum = 0;
      for (let i = 0; i < xValues.length; i += 1) {
        const p = Math.min(Math.max(sigmoid(w * xValues[i] + b), 1e-6), 1 - 1e-6);
        const y = dataState.yValues[i];
        sum += -(y * Math.log(p) + (1 - y) * Math.log(1 - p));
      }
      return sum / xValues.length;
    }

    function buildPatternTraces() {
      return basePatterns.map((pattern) => ({
        x: xValues,
        y: xValues.map((x) => sigmoid(pattern.w * x + pattern.b)),
        mode: "lines",
        type: "scatter",
        line: { color: "rgba(128, 128, 128, 0.85)", width: 2, dash: "dot" },
        hoverinfo: "skip",
        showlegend: false
      }));
    }

    function updatePlots() {
      const w = Number(weightRange.value);
      const b = Number(biasRange.value);
      const yCurve = xValues.map((x) => sigmoid(w * x + b));
      const nll = currentNll(w, b);

      weightValue.textContent = format(w);
      biasValue.textContent = format(b);
      noiseValue.textContent = Number(noiseRange.value).toFixed(1);
      thresholdValue.textContent = Number(thresholdRange.value).toFixed(1);

      const zeros = { x: [], y: [] };
      const ones = { x: [], y: [] };
      xValues.forEach((x, i) => {
        const y = dataState.yValues[i];
        if (y === 0) {
          zeros.x.push(x);
          zeros.y.push(0);
        } else {
          ones.x.push(x);
          ones.y.push(1);
        }
      });

      const modelData = [
        ...buildPatternTraces(),
        {
          x: zeros.x,
          y: zeros.y,
          mode: "markers",
          type: "scatter",
          name: "Data Points",
          marker: { color: "#1d4ed8", size: 8, symbol: "circle" }
        },
        {
          x: ones.x,
          y: ones.y,
          mode: "markers",
          type: "scatter",
          name: "Data Points",
          marker: { color: "#1d4ed8", size: 8, symbol: "circle" },
          showlegend: false
        },
        {
          x: xValues,
          y: yCurve,
          mode: "lines",
          type: "scatter",
          name: `Optimal Model (w=${format(w)}, b=${format(b)})`,
          line: { color: "#dc2626", width: 3 }
        }
      ];

      const modelLayout = {
        title: { text: "Logistic Regression Models", font: { size: 18 } },
        margin: { l: 60, r: 16, t: 48, b: 48 },
        paper_bgcolor: "#e5e5e5",
        plot_bgcolor: "#e5e5e5",
        xaxis: {
          title: "x",
          range: [-5.5, 5.5],
          gridcolor: "#c7c7c7",
          zerolinecolor: "#7a7a7a",
          showline: true,
          linecolor: "#4b5563",
          mirror: true
        },
        yaxis: {
          title: "P(y=1|x)",
          range: [-0.05, 1.05],
          gridcolor: "#c7c7c7",
          zerolinecolor: "#7a7a7a",
          showline: true,
          linecolor: "#4b5563",
          mirror: true
        },
        legend: {
          x: 0.02,
          y: 0.54,
          bgcolor: "rgba(245,245,245,0.92)",
          bordercolor: "#c7c7c7",
          borderwidth: 1
        },
        hovermode: "closest"
      };

      const lossData = [
        {
          x: wValues,
          y: bValues,
          z: dataState.nllGrid,
          type: "surface",
          colorscale: "Viridis",
          opacity: 0.92,
          showscale: false,
          name: "NLL surface"
        },
        {
          x: [dataState.optimalW],
          y: [dataState.optimalB],
          z: [dataState.minNll],
          type: "scatter3d",
          mode: "markers",
          name: `Minimum NLL (w=${format(w)}, b=${format(b)})`,
          marker: { color: "#dc2626", size: 6 }
        }
      ];

      const lossLayout = {
        title: { text: "NLL Loss Landscape", font: { size: 18 } },
        margin: { l: 10, r: 10, t: 48, b: 10 },
        paper_bgcolor: "#e5e5e5",
        scene: {
          xaxis: { title: "w", gridcolor: "#bfbfbf", zerolinecolor: "#808080", backgroundcolor: "#e5e5e5" },
          yaxis: { title: "b", gridcolor: "#bfbfbf", zerolinecolor: "#808080", backgroundcolor: "#e5e5e5" },
          zaxis: { title: "NLL", gridcolor: "#bfbfbf", zerolinecolor: "#808080", backgroundcolor: "#e5e5e5" },
          camera: { eye: { x: 1.25, y: 1.35, z: 0.9 } },
          aspectmode: "cube"
        },
        legend: {
          x: 0.58,
          y: 0.98,
          bgcolor: "rgba(245,245,245,0.92)",
          bordercolor: "#c7c7c7",
          borderwidth: 1
        }
      };

      if (!modelInitialized) {
        Plotly.newPlot("modelPlot", modelData, modelLayout, { responsive: true, displayModeBar: false });
        modelInitialized = true;
      } else {
        Plotly.react("modelPlot", modelData, modelLayout, { responsive: true, displayModeBar: false });
      }

      if (!lossInitialized) {
        Plotly.newPlot("lossPlot", lossData, lossLayout, { responsive: true, displayModeBar: false });
        lossInitialized = true;
      } else {
        Plotly.react("lossPlot", lossData, lossLayout, { responsive: true, displayModeBar: false });
      }

      status.innerHTML =
        `Current NLL: <code>${nll.toFixed(4)}</code>. ` +
        `The plot uses the same noisy 1D dataset and the same family of logistic curves. ` +
        `Dataset seed: <code>${dataState.seed}</code>.`;
    }

    function regenerateDataset(preserveModel = true) {
      const noiseScale = Number(noiseRange.value);
      const threshold = Number(thresholdRange.value);
      dataState = generateDataset(noiseScale, threshold, randomSeed);

      if (!preserveModel) {
        weightRange.value = dataState.optimalW.toFixed(2);
        biasRange.value = dataState.optimalB.toFixed(2);
      }
      updatePlots();
    }

    function resetDemo() {
      randomSeed = 0;
      noiseRange.value = "1.5";
      thresholdRange.value = "1.0";
      dataState = generateDataset(1.5, 1.0, randomSeed);
      weightRange.value = dataState.optimalW.toFixed(2);
      biasRange.value = dataState.optimalB.toFixed(2);
      updatePlots();
    }

    weightRange.addEventListener("input", updatePlots);
    biasRange.addEventListener("input", updatePlots);
    noiseRange.addEventListener("input", () => regenerateDataset(true));
    thresholdRange.addEventListener("input", () => regenerateDataset(true));
    optimalButton.addEventListener("click", () => {
      weightRange.value = dataState.optimalW.toFixed(2);
      biasRange.value = dataState.optimalB.toFixed(2);
      updatePlots();
    });
    regenerateButton.addEventListener("click", () => {
      randomSeed += 1;
      regenerateDataset(true);
    });
    resetButton.addEventListener("click", resetDemo);

    resetDemo();
  </script>
</body>
</html>
