<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Linear Separating Hyperplane</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --ink: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    body {
      padding: 14px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 12px 16px;
      margin: 14px 0 16px;
    }
    .control {
      display: grid;
      gap: 6px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }
    .control label {
      font-size: 14px;
      font-weight: 600;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control input[type="range"] {
      flex: 1;
    }
    .value {
      min-width: 56px;
      text-align: right;
      font-weight: 700;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 16px;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover {
      background: var(--bg);
    }
    .plot-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
    }
    .plot {
      width: 100%;
      height: 620px;
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      font-size: 14px;
    }
    code {
      background: #eef2ff;
      padding: 2px 5px;
      border-radius: 4px;
    }
    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .plot {
        height: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive Linear Separating Hyperplane</h1>
    <p>Adjust the components of <code>w</code> and the bias <code>b</code> to see how the hyperplane <code>w^T x + b = 0</code> moves.</p>

    <div class="controls">
      <div class="control">
        <label for="w1Range">Weight w1</label>
        <div class="control-row">
          <input id="w1Range" type="range" min="-3" max="3" step="0.1" value="0.9">
          <span class="value" id="w1Value">0.9</span>
        </div>
      </div>
      <div class="control">
        <label for="w2Range">Weight w2</label>
        <div class="control-row">
          <input id="w2Range" type="range" min="-3" max="3" step="0.1" value="-0.3">
          <span class="value" id="w2Value">-0.3</span>
        </div>
      </div>
      <div class="control">
        <label for="bRange">Bias b</label>
        <div class="control-row">
          <input id="bRange" type="range" min="-3" max="3" step="0.1" value="0">
          <span class="value" id="bValue">0.0</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="resetButton" type="button">Reset figure</button>
    </div>

    <div class="plot-card"><div class="plot" id="hyperplanePlot"></div></div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const w1Range = document.getElementById("w1Range");
    const w2Range = document.getElementById("w2Range");
    const bRange = document.getElementById("bRange");
    const w1Value = document.getElementById("w1Value");
    const w2Value = document.getElementById("w2Value");
    const bValue = document.getElementById("bValue");
    const resetButton = document.getElementById("resetButton");
    const status = document.getElementById("status");

    let initialized = false;

    function format(value) {
      return Number(value).toFixed(1);
    }

    function clipPoint(x, y, limit) {
      return {
        x: Math.max(-limit, Math.min(limit, x)),
        y: Math.max(-limit, Math.min(limit, y))
      };
    }

    function boundaryPoints(w1, w2, b, limit) {
      const pts = [];
      if (Math.abs(w2) > 1e-6) {
        [-limit, limit].forEach((x) => {
          const y = -(w1 * x + b) / w2;
          if (y >= -limit && y <= limit) pts.push({ x, y });
        });
      }
      if (Math.abs(w1) > 1e-6) {
        [-limit, limit].forEach((y) => {
          const x = -(w2 * y + b) / w1;
          if (x >= -limit && x <= limit) pts.push({ x, y });
        });
      }

      const unique = [];
      pts.forEach((pt) => {
        if (!unique.some((u) => Math.abs(u.x - pt.x) < 1e-6 && Math.abs(u.y - pt.y) < 1e-6)) {
          unique.push(pt);
        }
      });

      if (unique.length >= 2) {
        return [unique[0], unique[1]];
      }
      return [{ x: -limit, y: 0 }, { x: limit, y: 0 }];
    }

    function updatePlot() {
      let w1 = Number(w1Range.value);
      let w2 = Number(w2Range.value);
      const b = Number(bRange.value);
      const limit = 4;

      if (Math.abs(w1) < 0.1 && Math.abs(w2) < 0.1) {
        w1 = 0.1;
        w1Range.value = "0.1";
      }

      w1Value.textContent = format(w1);
      w2Value.textContent = format(w2);
      bValue.textContent = format(b);

      const xs = [];
      const ys = [];
      const z = [];
      for (let yi = -limit; yi <= limit; yi += 0.1) {
        const row = [];
        ys.push(Number(yi.toFixed(1)));
        for (let xi = -limit; xi <= limit; xi += 0.1) {
          if (ys.length === 1) xs.push(Number(xi.toFixed(1)));
          row.push(w1 * xi + w2 * yi + b);
        }
        z.push(row);
      }

      const [p1, p2] = boundaryPoints(w1, w2, b, limit);
      const data = [
        {
          x: xs,
          y: ys,
          z,
          type: "contour",
          contours: {
            start: -1,
            end: 1,
            size: 2,
            coloring: "fill",
            showlines: false
          },
          colorscale: [
            [0.0, "#ead5b8"],
            [0.499, "#ead5b8"],
            [0.5, "#ead5b8"],
            [0.501, "#d6e2ef"],
            [1.0, "#d6e2ef"]
          ],
          showscale: false,
          hoverinfo: "skip"
        },
        {
          x: [p1.x, p2.x],
          y: [p1.y, p2.y],
          mode: "lines",
          type: "scatter",
          name: "w^T x + b = 0",
          line: { color: "#111827", width: 4 }
        }
      ];

      const layout = {
        margin: { l: 20, r: 20, t: 20, b: 20 },
        paper_bgcolor: "#ffffff",
        plot_bgcolor: "#ffffff",
        xaxis: { visible: false, range: [-limit, limit], scaleanchor: "y", scaleratio: 1 },
        yaxis: { visible: false, range: [-limit, limit] },
        annotations: [
          {
            x: -0.4,
            y: 2.3,
            text: "<b>w<sup>T</sup>x + b &gt; 0</b>",
            showarrow: false,
            font: { size: 24, color: "#0f2747" }
          },
          {
            x: -0.6,
            y: -2.1,
            text: "<b>w<sup>T</sup>x + b &lt; 0</b>",
            showarrow: false,
            font: { size: 24, color: "#0f2747" }
          },
          {
            x: (p1.x + p2.x) / 2,
            y: (p1.y + p2.y) / 2 + 0.45,
            text: "<b>w<sup>T</sup>x + b = 0</b>",
            showarrow: false,
            textangle: Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI,
            font: { size: 20, color: "#0f172a" },
            bgcolor: "rgba(255,255,255,0.7)"
          }
        ]
      };

      if (!initialized) {
        Plotly.newPlot("hyperplanePlot", data, layout, { responsive: true, displayModeBar: false });
        initialized = true;
      } else {
        Plotly.react("hyperplanePlot", data, layout, { responsive: true, displayModeBar: false });
      }

      status.innerHTML =
        `Current hyperplane: <code>${format(w1)} x1 + ${format(w2)} x2 + ${format(b)} = 0</code>. ` +
        `Changing <code>w = [${format(w1)}, ${format(w2)}]</code> rotates the boundary, while changing <code>b</code> shifts it.`;
    }

    resetButton.addEventListener("click", () => {
      w1Range.value = "0.9";
      w2Range.value = "-0.3";
      bRange.value = "0";
      updatePlot();
    });

    [w1Range, w2Range, bRange].forEach((el) => el.addEventListener("input", updatePlot));
    updatePlot();
  </script>
</body>
</html>
