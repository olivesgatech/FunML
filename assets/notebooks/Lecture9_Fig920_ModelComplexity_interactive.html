<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#fff;--blue:#2563eb;--red:#dc2626;--green:#059669;--gold:#d97706;--purple:#7c3aed}
    html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
    body{padding:14px}
    .wrap{max-width:1240px;margin:0 auto}
    h1{margin:0 0 6px;font-size:24px}
    p{margin:0 0 12px;color:var(--muted)}
    .controls{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px 16px;margin:14px 0 16px}
    .control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
    .control label{font-size:14px;font-weight:600}
    .row{display:flex;align-items:center;gap:10px}
    .row input[type=range]{flex:1}
    .value{min-width:56px;text-align:right;font-weight:700}
    .plots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .plots.wide{grid-template-columns:1fr}
    .plots.quad{grid-template-columns:repeat(2,minmax(0,1fr))}
    .plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
    .plot{width:100%;height:520px}
    .status{margin-top:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
    @media(max-width:980px){
      .controls{grid-template-columns:repeat(2,minmax(0,1fr))}
      .plots,.plots.quad{grid-template-columns:1fr}
      .plot{height:360px}
    }
  </style>
</head>
<body>
<div class="wrap"><h1>Figure 9.20: Regression Fits Across Model Complexity</h1><p>Low degree underfits, moderate degree tracks the trend, and high degree begins to chase noise.</p><div class="controls"><div class="control"><label>Noise</label><div class="row"><input id="noise" type="range" min="0.05" max="0.80" step="0.05" value="0.25"><span class="value" id="noisev">0.25</span></div></div><div class="control"><label>Samples</label><div class="row"><input id="n" type="range" min="25" max="90" step="5" value="45"><span class="value" id="nv">45</span></div></div><div class="control"><label>Mid degree</label><div class="row"><input id="mid" type="range" min="1" max="8" step="1" value="4"><span class="value" id="midv">4</span></div></div><div class="control"><label>High degree</label><div class="row"><input id="high" type="range" min="1" max="14" step="1" value="12"><span class="value" id="highv">12</span></div></div></div><div class="plots wide"><div class="plot-card"><div id="main" class="plot"></div></div></div><div class="status" id="status"></div></div><script>
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function randn(rng){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function linspace(a,b,n){if(n===1)return[a];const step=(b-a)/(n-1);return Array.from({length:n},(_,i)=>a+i*step)}
function polyval(theta,x){let s=0,p=1;for(let i=0;i<theta.length;i++){s+=theta[i]*p;p*=x}return s}
function designRow(x,deg){const row=new Array(deg+1);let p=1;for(let i=0;i<=deg;i++){row[i]=p;p*=x}return row}
function solve(A,b){
  const n=A.length, M=A.map(r=>r.slice()), y=b.slice();
  for(let i=0;i<n;i++){
    let piv=i;
    for(let r=i+1;r<n;r++) if(Math.abs(M[r][i])>Math.abs(M[piv][i])) piv=r;
    if(piv!==i){[M[i],M[piv]]=[M[piv],M[i]];[y[i],y[piv]]=[y[piv],y[i]]}
    const div=Math.abs(M[i][i])<1e-10?(M[i][i] < 0 ? -1e-10 : 1e-10):M[i][i];
    for(let c=i;c<n;c++) M[i][c]/=div;
    y[i]/=div;
    for(let r=0;r<n;r++){
      if(r===i) continue;
      const f=M[r][i];
      for(let c=i;c<n;c++) M[r][c]-=f*M[i][c];
      y[r]-=f*y[i];
    }
  }
  return y;
}
function ridgeFit(x,y,deg,lam){
  const m=deg+1, A=Array.from({length:m},()=>Array(m).fill(0)), b=Array(m).fill(0);
  for(let i=0;i<x.length;i++){
    const row=designRow(x[i],deg);
    for(let r=0;r<m;r++){
      b[r]+=row[r]*y[i];
      for(let c=0;c<m;c++) A[r][c]+=row[r]*row[c];
    }
  }
  for(let i=1;i<m;i++) A[i][i]+=lam;
  return solve(A,b);
}
function mseFromTheta(theta,x,y){let s=0;for(let i=0;i<x.length;i++){const e=polyval(theta,x[i])-y[i];s+=e*e}return s/x.length}
function baseCurve(x){return 1 + 0.7*x - 0.35*x*x + 0.06*x*x*x}
function makePolyData(seed,n,obsNoise,gtNoise){
  const rng=mulberry32(seed), x=linspace(-3,3,n);
  const yTrue=x.map(v=>baseCurve(v));
  const yStar=yTrue.map(v=>v + gtNoise*randn(rng));
  const y=yStar.map(v=>v + obsNoise*randn(rng));
  return {x,y,yTrue,yStar};
}
function setValue(id, text){document.getElementById(id).textContent=text}


function render(){
  const noise=+noiseEl.value, n=+nEl.value, mid=+midEl.value, high=+highEl.value;
  setValue('noisev', noise.toFixed(2)); setValue('nv', n); setValue('midv', mid); setValue('highv', high);
  const data=makePolyData(23,n,noise,0.0);
  const xg=linspace(-3,3,220);
  const low=ridgeFit(data.x,data.y,1,0.0);
  const midFit=ridgeFit(data.x,data.y,mid,0.0);
  const highFit=ridgeFit(data.x,data.y,high,0.0);
  Plotly.newPlot('main',[
    {x:data.x,y:data.y,mode:'markers',name:'samples',marker:{color:'#334155',size:7}},
    {x:xg,y:xg.map(baseCurve),mode:'lines',name:'true trend',line:{color:'#64748b',dash:'dash',width:2}},
    {x:xg,y:xg.map(v=>polyval(low,v)),mode:'lines',name:'degree 1',line:{color:'#2563eb',width:3}},
    {x:xg,y:xg.map(v=>polyval(midFit,v)),mode:'lines',name:`degree ${mid}`,line:{color:'#059669',width:3}},
    {x:xg,y:xg.map(v=>polyval(highFit,v)),mode:'lines',name:`degree ${high}`,line:{color:'#dc2626',width:3}}
  ], {
    title:'All model complexities in one figure',
    margin:{t:44,l:52,r:18,b:48},
    xaxis:{title:'x'},
    yaxis:{title:'y'},
    legend:{orientation:'h',yanchor:'bottom',y:1.02,xanchor:'left',x:0}
  }, {displayModeBar:false,responsive:true});
  document.getElementById('status').textContent=`Degree 1 is the low-complexity baseline; degree ${mid} is the moderate model; degree ${high} is the high-complexity model.\nUse Figure 9.21 for the error-vs-complexity summary.`;
}
const noiseEl=document.getElementById('noise'), nEl=document.getElementById('n'), midEl=document.getElementById('mid'), highEl=document.getElementById('high');
['noise','n','mid','high'].forEach(id=>document.getElementById(id).addEventListener('input', render));
render();

</script></body></html>
