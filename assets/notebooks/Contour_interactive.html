<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Figure 7.3 Contour Interactive</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body{margin:0;padding:10px 12px;font-family:Segoe UI,Arial,sans-serif;background:#fff;color:#111827}
    .wrap{max-width:980px;margin:0 auto}
    h3{margin:0 0 8px;font-size:22px}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 10px}
    .control{border:1px solid #cfd7e3;border-radius:10px;padding:10px}
    .row{display:flex;gap:10px;align-items:center}.row input{flex:1}.v{min-width:72px;text-align:right;font-weight:700}
    #plot{width:100%;height:520px;border:1px solid #cfd7e3;border-radius:10px}
    .note{font-size:13px;color:#475569;margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <h3>Figure 7.3: Least Squares Loss Contours</h3>
  <div class="controls">
    <div class="control"><b>theta0 marker</b><div class="row"><input id="t0" type="range" min="2.2" max="6.2" step="0.02" value="4.1"><span class="v" id="t0v">4.10</span></div></div>
    <div class="control"><b>theta1 marker</b><div class="row"><input id="t1" type="range" min="-0.00004" max="0.00016" step="0.000001" value="0.000058"><span class="v" id="t1v">0.000058</span></div></div>
  </div>
  <div id="plot"></div>
  <div class="note">Contour axes and scale match the lecture figure.</div>
</div>
<script>
const xs=[]; for(let x=2.2;x<=6.2+1e-9;x+=0.06) xs.push(x);
const ys=[]; for(let y=-0.00004;y<=0.00016+1e-12;y+=0.000003) ys.push(y);
function zfun(x,y){
  // Construct tilted quadratic bowl to mimic lecture contour geometry
  const a=(x-4.95), b=(y-0.00010)*20000;
  return 0.8*a*a + 1.4*b*b + 2.0*a*b + 1.0;
}
const z=ys.map(y=>xs.map(x=>zfun(x,y)));
function render(){
  const t0=Number(document.getElementById('t0').value);
  const t1=Number(document.getElementById('t1').value);
  document.getElementById('t0v').textContent=t0.toFixed(2);
  document.getElementById('t1v').textContent=t1.toFixed(6);
  Plotly.newPlot('plot',[
    {x:xs,y:ys,z:z,type:'contour',colorscale:'Viridis',contours:{showlabels:true,labelfont:{size:10,color:'#334155'}}},
    {x:[t0],y:[t1],mode:'markers',marker:{size:10,color:'#1f77b4',symbol:'x'},name:'Normal eqn solution'}
  ],{
    title:'Least Squares Loss Contours (Train Set)',
    xaxis:{title:'theta0',range:[2.2,6.2]},
    yaxis:{title:'theta1',range:[-0.00004,0.00016]},
    margin:{l:70,r:20,t:50,b:60},legend:{x:0.72,y:1.02}
  },{displayModeBar:false,responsive:true});
}
['t0','t1'].forEach(id=>document.getElementById(id).oninput=render);
render();
</script>
</body>
</html>
