<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Figure 7.3 Contour Interactive</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body{margin:0;padding:10px 12px;font-family:Segoe UI,Arial,sans-serif;background:#fff;color:#111827}
    .wrap{max-width:1040px;margin:0 auto}
    h3{margin:0 0 8px;font-size:22px}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 10px}
    .control{border:1px solid #cfd7e3;border-radius:10px;padding:10px}
    .row{display:flex;gap:10px;align-items:center}
    .row input{flex:1}
    .v{min-width:72px;text-align:right;font-weight:700}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    button{border:1px solid #cbd5e1;background:#fff;border-radius:999px;padding:7px 12px;font-weight:600;cursor:pointer}
    button:hover{background:#f8fafc}
    #plot{width:100%;height:520px;border:1px solid #cfd7e3;border-radius:10px}
    .note{font-size:13px;color:#475569;margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <h3>Figure 7.3: Least Squares Loss Contours</h3>

  <div class="controls">
    <div class="control"><b>theta0 marker</b><div class="row"><input id="t0" type="range" min="2.2" max="6.2" step="0.02" value="4.10"><span class="v" id="t0v">4.10</span></div></div>
    <div class="control"><b>theta1 marker</b><div class="row"><input id="t1" type="range" min="-0.00004" max="0.00016" step="0.000001" value="0.000058"><span class="v" id="t1v">0.000058</span></div></div>
  </div>

  <div class="actions">
    <button id="snap">Snap To Normal Equation</button>
    <button id="regen">Regenerate Data</button>
  </div>

  <div id="plot"></div>
  <div class="note" id="status">Tip: click anywhere on the contour to move the current marker.</div>
</div>

<script>
let xTrain = [], yTrain = [];
let theta0NE = 4.1, theta1NE = 0.000058;

const xMin = 2.2, xMax = 6.2;
const yMin = -0.00004, yMax = 0.00016;

function randn(){
  let u=0, v=0;
  while(u===0) u=Math.random();
  while(v===0) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

function generateData(){
  xTrain = [];
  yTrain = [];
  const n = 32;
  const beta0 = 4.1;
  const beta1 = 0.000058;
  const noiseStd = 0.18;
  for(let i=0;i<n;i++){
    const x = 22000 + (60000-22000)*(i/(n-1));
    const y = beta0 + beta1*x + noiseStd*randn();
    xTrain.push(x);
    yTrain.push(y);
  }
  const nX = xTrain.length;
  let sx=0, sy=0, sxx=0, sxy=0;
  for(let i=0;i<nX;i++){
    const x=xTrain[i], y=yTrain[i];
    sx += x; sy += y; sxx += x*x; sxy += x*y;
  }
  const det = nX*sxx - sx*sx;
  theta0NE = (sxx*sy - sx*sxy)/det;
  theta1NE = (-sx*sy + nX*sxy)/det;
}

function mse(theta0, theta1){
  let s = 0;
  for(let i=0;i<xTrain.length;i++){
    const e = theta0 + theta1*xTrain[i] - yTrain[i];
    s += e*e;
  }
  return s/xTrain.length;
}

function buildGrid(){
  const xs = [], ys = [];
  for(let x=xMin;x<=xMax+1e-9;x+=0.06) xs.push(Number(x.toFixed(4)));
  for(let y=yMin;y<=yMax+1e-12;y+=0.000003) ys.push(Number(y.toFixed(9)));
  const z = ys.map(ty => xs.map(tx => mse(tx, ty)));
  return {xs, ys, z};
}

function render(){
  const t0 = Number(document.getElementById('t0').value);
  const t1 = Number(document.getElementById('t1').value);
  document.getElementById('t0v').textContent = t0.toFixed(2);
  document.getElementById('t1v').textContent = t1.toFixed(6);

  const {xs, ys, z} = buildGrid();
  const curLoss = mse(t0, t1);
  const neLoss = mse(theta0NE, theta1NE);

  Plotly.newPlot('plot', [
    {
      x: xs, y: ys, z: z,
      type: 'contour',
      colorscale: 'Viridis',
      contours: {showlabels: true, labelfont: {size: 10, color: '#334155'}}
    },
    {
      x: [theta0NE], y: [theta1NE],
      mode: 'markers',
      marker: {size: 11, color: '#16a34a', symbol: 'star'},
      name: 'Normal eqn solution'
    },
    {
      x: [t0], y: [t1],
      mode: 'markers',
      marker: {size: 10, color: '#1f77b4', symbol: 'x'},
      name: 'Current marker'
    }
  ], {
    title: 'Least Squares Loss Contours (Train Set)',
    xaxis: {title: 'theta0', range: [xMin, xMax]},
    yaxis: {title: 'theta1', range: [yMin, yMax]},
    margin: {l: 70, r: 20, t: 50, b: 60},
    legend: {x: 0.68, y: 1.02}
  }, {displayModeBar: false, responsive: true});

  document.getElementById('status').textContent =
    `Current MSE: ${curLoss.toFixed(5)} | Normal-eqn MSE: ${neLoss.toFixed(5)} | ` +
    `Normal solution: (theta0=${theta0NE.toFixed(3)}, theta1=${theta1NE.toFixed(6)})`;

  const plotEl = document.getElementById('plot');
  plotEl.on('plotly_click', (ev) => {
    if(!ev || !ev.points || !ev.points.length) return;
    const p = ev.points[0];
    if(typeof p.x !== 'number' || typeof p.y !== 'number') return;
    const nx = Math.max(xMin, Math.min(xMax, p.x));
    const ny = Math.max(yMin, Math.min(yMax, p.y));
    document.getElementById('t0').value = nx;
    document.getElementById('t1').value = ny;
    render();
  });
}

function snapToNE(){
  document.getElementById('t0').value = theta0NE;
  document.getElementById('t1').value = theta1NE;
  render();
}

function regenData(){
  generateData();
  snapToNE();
}

document.getElementById('t0').oninput = render;
document.getElementById('t1').oninput = render;
document.getElementById('snap').onclick = snapToNE;
document.getElementById('regen').onclick = regenData;

generateData();
snapToNE();
</script>
</body>
</html>
