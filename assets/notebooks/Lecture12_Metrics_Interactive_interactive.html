<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Interactive Clustering Metrics (Section 12.3)</title><script src="plotly-2.35.2.min.js"></script><style>
:root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#fff;--a:#2563eb;--b:#dc2626;--c:#059669}
html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
body{padding:14px}.wrap{max-width:1200px;margin:0 auto}h1{margin:0 0 8px;font-size:24px}p{margin:0 0 12px;color:var(--muted)}
.controls{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px 16px;margin:14px 0 16px}
.control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
.control label{font-size:14px;font-weight:600}.row{display:flex;align-items:center;gap:10px}.row input[type=range]{flex:1}.value{min-width:56px;text-align:right;font-weight:700}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 16px}button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600}
button:hover{background:var(--bg)}.plots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
.plot{width:100%;height:460px}.status{margin-top:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
@media(max-width:980px){.controls{grid-template-columns:repeat(2,minmax(0,1fr))}.plots{grid-template-columns:1fr}.plot{height:380px}}
</style></head><body><div class="wrap"><h1>Interactive Clustering Metrics (Section 12.3)</h1><p>Same data, computed internal and external clustering metrics.</p><div class="controls"><div class="control"><label>points per cluster</label><div class="row"><input id="ppc" type="range" min="20" max="120" step="5" value="40"><span class="value" id="ppcv">40</span></div></div><div class="control"><label>noise</label><div class="row"><input id="noise" type="range" min="0.1" max="1.2" step="0.05" value="0.55"><span class="value" id="noisev">0.55</span></div></div><div class="control"><label>k</label><div class="row"><input id="k" type="range" min="2" max="6" step="1" value="3"><span class="value" id="kv">3</span></div></div></div><div class="actions"><button id="regen">Regenerate</button></div><div class="plots"><div class="plot-card"><div id="sc" class="plot"></div></div><div class="plot-card"><div id="mt" class="plot"></div></div></div><div class="status" id="status"></div></div><script>function randn(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function makeData(ppc,noise){const centers=[[-2,0],[2,0],[0,2.5]],X=[],y=[]; for(let j=0;j<3;j++){for(let i=0;i<ppc;i++){X.push([centers[j][0]+noise*randn(),centers[j][1]+noise*randn()]); y.push(j)}} return [X,y]}
function kmeans(X,k,it=20){let C=[...X].sort(()=>Math.random()-0.5).slice(0,k).map(p=>[...p]); let y=Array(X.length).fill(0); for(let t=0;t<it;t++){y=X.map(p=>{let bi=0,bd=1e18; for(let j=0;j<k;j++){const d=(p[0]-C[j][0])**2+(p[1]-C[j][1])**2; if(d<bd){bd=d;bi=j}} return bi}); for(let j=0;j<k;j++){const pts=X.filter((_,i)=>y[i]===j); if(pts.length)C[j]=[pts.reduce((s,p)=>s+p[0],0)/pts.length,pts.reduce((s,p)=>s+p[1],0)/pts.length]} } return y}
function pairAgree(a,b){let ag=0,tot=0; for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++){ag += ((a[i]===a[j])===(b[i]===b[j]))?1:0; tot++} return ag/tot}
function purity(yTrue,yPred){const cls=[...new Set(yPred)]; let s=0; for(const c of cls){const idx=yPred.map((v,i)=>v===c?i:-1).filter(i=>i>=0); const cnt={}; idx.forEach(i=>cnt[yTrue[i]]=(cnt[yTrue[i]]||0)+1); s += Math.max(...Object.values(cnt))} return s/yTrue.length}
function render(){const ppc=+ppcEl.value, noise=+noiseEl.value, k=+kEl.value; ppcv.textContent=ppc;noisev.textContent=noise.toFixed(2);kv.textContent=k; const [X,yTrue]=makeData(ppc,noise); const y=kmeans(X,k);
Plotly.newPlot('sc',[{x:X.map(p=>p[0]),y:X.map(p=>p[1]),mode:'markers',marker:{size:7,color:y,colorscale:'Turbo'}}],{title:'Predicted clusters on same data',xaxis:{scaleanchor:'y'}},{displayModeBar:false});
const ri=pairAgree(yTrue,y), pu=purity(yTrue,y); // lightweight internal proxies
const intra=[]; const cls=[...new Set(y)]; for(const c of cls){const pts=X.filter((_,i)=>y[i]===c); if(pts.length<2)continue; let s=0,ct=0; for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){s+=Math.hypot(pts[i][0]-pts[j][0],pts[i][1]-pts[j][1]);ct++} intra.push(s/ct)}
const silProxy=1/(1+(intra.reduce((a,b)=>a+b,0)/(intra.length||1))); const dbProxy=(intra.reduce((a,b)=>a+b,0)/(intra.length||1)); const dunnProxy=1/(dbProxy+1e-9); const miProxy=Math.max(0,Math.log(1+ri*pu));
Plotly.newPlot('mt',[{type:'table',header:{values:['Metric','Value']},cells:{values:[['Silhouette (proxy)','Davies-Bouldin (proxy)','Dunn (proxy)','Rand Index','Purity','Mutual Info (proxy)'],[silProxy.toFixed(4),dbProxy.toFixed(4),dunnProxy.toFixed(4),ri.toFixed(4),pu.toFixed(4),miProxy.toFixed(4)]]}}],{title:'Internal + external metrics'},{displayModeBar:false});
status.textContent='Metrics are recomputed for the same generated dataset each time controls change.'}
const ppcEl=ppc, noiseEl=noise, kEl=k; regen.onclick=render; [ppc,noise,k].forEach(el=>el.addEventListener('input',render)); render();</script></body></html>
