<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Notebook Launcher: Lecture4_DecisionTree_Outlook</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    .wrap { height: 100%; display: flex; flex-direction: column; background: #ffffff; }
    .top { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; font: 14px/1.4 sans-serif; }
    .top a { color: #0b57d0; text-decoration: none; }
    iframe { flex: 1; width: 100%; border: 0; min-height: 640px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      Open directly in JupyterLite:
      <a href="../jupyterlite/lab/index.html?path=notebooks/Lecture4_DecisionTree_Outlook.ipynb&amp;reset=1" target="_blank" rel="noopener noreferrer">Lecture4_DecisionTree_Outlook.ipynb</a>
    </div>
    <iframe src="../jupyterlite/lab/index.html?path=notebooks/Lecture4_DecisionTree_Outlook.ipynb&amp;reset=1" title="Interactive Notebook Launcher: Lecture4_DecisionTree_Outlook" loading="lazy"></iframe>
  </div>
<script>
(function () {
  const iframe = document.querySelector('iframe');
  if (!iframe) return;

  const CSS = `
    .jp-SideBar, .jp-Activity, .jp-StatusBar,
    .jp-NotebookPanel-toolbar, .jp-FileBrowser,
    .jp-DirListing, .jp-BreadCrumbs, .jp-RunningSessions,
    .jp-Launcher,
    .jp-mod-commandMode .jp-Cell-inputCollapser,
    .jp-Cell .jp-InputPrompt { display: none !important; }

    .jp-Notebook .jp-CodeCell .jp-InputArea,
    .jp-Notebook .jp-MarkdownCell .jp-InputArea,
    .jp-Notebook .jp-RawCell .jp-InputArea,
    .jp-Cell .jp-InputArea,
    .jp-Cell-inputWrapper { display: none !important; }

    .jp-LabShell { grid-template-columns: 0px 1fr 0px !important; }
    .jp-main-content-panel, .jp-NotebookPanel, .jp-Notebook { width: 100% !important; }
    .jp-Notebook { padding: 8px 16px !important; }
    .lm-DockPanel-tabBar, .lm-TabBar { display: none !important; }
  `;

  function injectCSS() {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      if (!doc || !doc.head) return;
      let style = doc.getElementById('output-only-style');
      if (!style) {
        style = doc.createElement('style');
        style.id = 'output-only-style';
        style.textContent = CSS;
        doc.head.appendChild(style);
      }
    } catch (_) {}
  }

  async function tryRunAll() {
    try {
      const w = iframe.contentWindow;
      const app = w && (w.jupyterapp || w.jupyterlab || w.app);
      if (!app || !app.commands) return false;
      await app.commands.execute('notebook:run-all-cells');
      return true;
    } catch (_) {
      return false;
    }
  }

  iframe.addEventListener('load', () => {
    injectCSS();
    let tries = 0;
    const id = setInterval(async () => {
      injectCSS();
      tries += 1;
      const ran = await tryRunAll();
      if (ran || tries > 40) clearInterval(id);
    }, 600);
  });
})();
</script>
</body>
</html>
