<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Interactive K-Means Steps (Lecture 11)</title><script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script><style>
:root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#fff;--a:#2563eb;--b:#dc2626;--c:#059669}
html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
body{padding:14px}.wrap{max-width:1200px;margin:0 auto}h1{margin:0 0 8px;font-size:24px}p{margin:0 0 12px;color:var(--muted)}
.controls{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px 16px;margin:14px 0 16px}
.control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
.control label{font-size:14px;font-weight:600}.row{display:flex;align-items:center;gap:10px}.row input[type=range]{flex:1}.value{min-width:56px;text-align:right;font-weight:700}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 16px}button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600}
button:hover{background:var(--bg)}.plots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
.plot{width:100%;height:460px}.status{margin-top:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
@media(max-width:980px){.controls{grid-template-columns:repeat(2,minmax(0,1fr))}.plots{grid-template-columns:1fr}.plot{height:380px}}
</style></head><body><div class="wrap"><h1>Interactive K-Means Steps (Lecture 11)</h1><p>Choose k, initialize centroids, and run iterative assignment/update.</p><div class="controls"><div class="control"><label>k</label><div class="row"><input id="k" type="range" min="2" max="8" step="1" value="3"><span class="value" id="kv">3</span></div></div><div class="control"><label>n points</label><div class="row"><input id="n" type="range" min="60" max="300" step="30" value="120"><span class="value" id="nv">120</span></div></div><div class="control"><label>noise</label><div class="row"><input id="noise" type="range" min="0.15" max="1.2" step="0.05" value="0.45"><span class="value" id="noisev">0.45</span></div></div></div><div class="actions"><button id="regen">Regenerate data</button><button id="init">Initialize centroids</button><button id="step">Run one step</button></div><div class="plots"><div class="plot-card"><div id="km" class="plot"></div></div><div class="plot-card"><div id="hist" class="plot"></div></div></div><div class="status" id="status"></div></div><script>function randn(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
let X=[],C=[],labels=[];
function makeData(){const N=+n.value,noise=+noiseEl.value; X=[]; const centers=[[-2,-1.5],[2,-1],[0,2]]; for(let j=0;j<3;j++){for(let i=0;i<Math.floor(N/3);i++){X.push([centers[j][0]+noise*randn(),centers[j][1]+noise*randn()])}} labels=Array(X.length).fill(0)}
function initC(){const K=+k.value; C=[]; const idx=[...Array(X.length).keys()].sort(()=>Math.random()-0.5).slice(0,K); for(const i of idx)C.push([...X[i]])}
function stepOnce(){if(!C.length)return; const K=C.length; labels=X.map(p=>{let bi=0,bd=1e18; for(let j=0;j<K;j++){const d=(p[0]-C[j][0])**2+(p[1]-C[j][1])**2; if(d<bd){bd=d;bi=j}} return bi});
for(let j=0;j<K;j++){const pts=X.filter((_,i)=>labels[i]===j); if(pts.length){C[j]=[pts.reduce((s,p)=>s+p[0],0)/pts.length, pts.reduce((s,p)=>s+p[1],0)/pts.length]}}
}
function render(){kv.textContent=k.value;nv.textContent=n.value;noisev.textContent=Number(noise.value).toFixed(2); const K=Math.max(C.length,1); Plotly.newPlot('km',[{x:X.map(p=>p[0]),y:X.map(p=>p[1]),mode:'markers',marker:{size:7,color:labels,colorscale:'Turbo'},name:'points'},{x:C.map(p=>p[0]),y:C.map(p=>p[1]),mode:'markers',marker:{size:16,color:'black',symbol:'x'},name:'centroids'}],{title:'K-means step demo',xaxis:{scaleanchor:'y'}},{displayModeBar:false});
const counts=Array(K).fill(0); labels.forEach(l=>{if(l<counts.length)counts[l]++}); Plotly.newPlot('hist',[{x:counts.map((_,i)=>`C${i}`),y:counts,type:'bar'}],{title:'Cluster sizes'},{displayModeBar:false}); status.textContent=`k=${K}, points=${X.length}`}
const noiseEl=document.getElementById('noise'); regen.onclick=()=>{makeData();initC();render()}; init.onclick=()=>{initC();render()}; step.onclick=()=>{stepOnce();render()}; ['k','n','noise'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{makeData();initC();render()})); makeData();initC();render();</script></body></html>
