<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="plotly-2.35.2.min.js"></script>
  <style>
    :root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#fff;--blue:#2563eb;--red:#dc2626;--green:#059669;--gold:#d97706;--purple:#7c3aed}
    html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
    body{padding:14px}
    .wrap{max-width:1240px;margin:0 auto}
    h1{margin:0 0 6px;font-size:24px}
    p{margin:0 0 12px;color:var(--muted)}
    .controls{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px 16px;margin:14px 0 16px}
    .control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
    .control label{font-size:14px;font-weight:600}
    .row{display:flex;align-items:center;gap:10px}
    .row input[type=range], .row select{flex:1}
    .value{min-width:56px;text-align:right;font-weight:700}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 16px}
    button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600}
    button:hover{background:var(--bg)}
    .plots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .plots.wide{grid-template-columns:1fr}
    .plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
    .plot{width:100%;height:420px}
    .status{margin-top:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
    table.meta{width:100%;border-collapse:collapse;font-size:14px}
    table.meta th, table.meta td{border:1px solid var(--line);padding:6px 8px;text-align:center}
    @media(max-width:980px){.controls{grid-template-columns:repeat(2,minmax(0,1fr))}.plots{grid-template-columns:1fr}.plot{height:360px}}
  </style>
</head>
<body>
<div class="wrap"><h1>Interactive K-Means Steps (Lecture 11)</h1><p>Choose initial centroids directly on the plot, then walk through assignment and update steps. The same notebook also lets you vary k.</p><div class="controls"><div class="control"><label>k</label><div class="row"><input id="k" type="range" min="2" max="6" step="1" value="3"><span class="value" id="kv">3</span></div></div><div class="control"><label>n points</label><div class="row"><input id="n" type="range" min="60" max="240" step="30" value="150"><span class="value" id="nv">150</span></div></div><div class="control"><label>noise</label><div class="row"><input id="noise" type="range" min="0.15" max="1.10" step="0.05" value="0.45"><span class="value" id="noisev">0.45</span></div></div><div class="control"><label>seed</label><div class="row"><input id="seed" type="range" min="1" max="20" step="1" value="6"><span class="value" id="seedv">6</span></div></div></div><div class="actions"><button id="regen">Regenerate data</button><button id="clear">Clear centroids</button><button id="random">Random init</button><button id="assign">Assignment step</button><button id="update">Update step</button><button id="iterate">Run full iteration</button></div><div class="plots"><div class="plot-card"><div id="scatter" class="plot"></div></div><div class="plot-card"><div id="sizes" class="plot"></div></div></div><div class="status" id="status"></div></div><script>
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function randn(rng){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function linspace(a,b,n){if(n===1)return[a];const h=(b-a)/(n-1);return Array.from({length:n},(_,i)=>a+i*h)}
function setText(id,text){document.getElementById(id).textContent=text}
function argmin(arr){let bi=0,bv=arr[0];for(let i=1;i<arr.length;i++)if(arr[i]<bv){bv=arr[i];bi=i}return bi}


let X=[], C=[], labels=[], iterCount=0, lastAssigned=false;
function makeData(){
  const rng=mulberry32(+seed.value), N=+n.value, s=+noise.value, base=[[-2.2,-1.4],[2.2,-1.0],[0.3,2.2]];
  X=[]; const per=Math.floor(N/base.length);
  for(const c of base){for(let i=0;i<per;i++)X.push([c[0]+s*randn(rng), c[1]+s*randn(rng)])}
  while(X.length<N){const c=base[X.length%base.length]; X.push([c[0]+s*randn(rng), c[1]+s*randn(rng)])}
  labels=Array(X.length).fill(-1); C=[]; iterCount=0; lastAssigned=false;
}
function setKText(){setText('kv', k.value); setText('nv', n.value); setText('noisev', (+noise.value).toFixed(2)); setText('seedv', seed.value)}
function randomInit(){
  const rng=mulberry32(1000 + +seed.value), idx=[...Array(X.length).keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(rng()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]}
  C=idx.slice(0,+k.value).map(i=>X[i].slice());
  labels=Array(X.length).fill(-1); iterCount=0; lastAssigned=false;
}
function assignStep(){
  if(C.length!==+k.value)return;
  labels=X.map(p=>argmin(C.map(c=>(p[0]-c[0])**2+(p[1]-c[1])**2)));
  lastAssigned=true;
}
function updateStep(){
  if(!lastAssigned || C.length!==+k.value)return;
  const K=C.length, newC=[];
  for(let j=0;j<K;j++){
    const pts=X.filter((_,i)=>labels[i]===j);
    if(pts.length){
      newC.push([
        pts.reduce((s,p)=>s+p[0],0)/pts.length,
        pts.reduce((s,p)=>s+p[1],0)/pts.length
      ]);
    }else newC.push(C[j]);
  }
  C = newC;
  iterCount += 1;
  lastAssigned = false;
}
function fullIter(){assignStep(); updateStep(); render();}
function clusterCounts(){const K=Math.max(+k.value, C.length, 1), c=Array(K).fill(0); labels.forEach(v=>{if(v>=0&&v<c.length)c[v]++}); return c}
function render(){
  setKText();
  const pointColors=labels.map(v=>v<0?'#c4c4c4':v);
  Plotly.newPlot('scatter',[
    {x:X.map(p=>p[0]), y:X.map(p=>p[1]), mode:'markers', name:'points', marker:{size:8,color:pointColors,colorscale:'Turbo',line:{width:0}}},
    {x:C.map(p=>p[0]), y:C.map(p=>p[1]), mode:'markers', name:'centroids', marker:{size:16,color:'black',symbol:'x'}}
  ],{title:'Choose initial centroids by clicking points, then run assignment/update',margin:{t:44,l:44,r:12,b:40},xaxis:{scaleanchor:'y'}},{displayModeBar:false,responsive:true});
  const plot=document.getElementById('scatter');
  if(plot.removeAllListeners) plot.removeAllListeners('plotly_click');
  plot.on('plotly_click', ev=>{
    const idx=ev.points[0].pointIndex;
    const picked=X[idx];
    const pos2=C.findIndex(c=>Math.abs(c[0]-picked[0])<1e-9 && Math.abs(c[1]-picked[1])<1e-9);
    if(pos2>=0) C.splice(pos2,1);
    else if(C.length<+k.value) C.push(picked.slice());
    labels=Array(X.length).fill(-1); iterCount=0; lastAssigned=false; render();
  });
  const counts=clusterCounts();
  const hasAssignments = labels.some(v=>v >= 0);
  const sizeLayout = {
    title:'Cluster sizes',
    margin:{t:44,l:44,r:12,b:40},
    yaxis:{
      title:'count',
      range:[0, Math.max(1, X.length)],
      rangemode:'tozero'
    },
    annotations: hasAssignments ? [] : [{
      xref:'paper',
      yref:'paper',
      x:0.5,
      y:0.6,
      text:'Choose centroids, then run Assignment step',
      showarrow:false,
      font:{size:14,color:'#475569'}
    }]
  };
  Plotly.newPlot('sizes',[
    {
      x:counts.map((_,i)=>`C${i}`),
      y:counts,
      type:'bar',
      marker:{color: hasAssignments ? '#2563eb' : '#cbd5e1'}
    }
  ], sizeLayout, {displayModeBar:false,responsive:true});
  document.getElementById('status').textContent =
    `Selected centroids: ${C.length}/${k.value}\nIterations completed: ${iterCount}\nClick points to set initial centroids. Cluster sizes appear after the Assignment step. Use Assignment, then Update, to walk through the lecture steps.`;
}
const k=document.getElementById('k'), n=document.getElementById('n'), noise=document.getElementById('noise'), seed=document.getElementById('seed');
['k','n','noise','seed'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{makeData(); render();}));
regen.onclick=()=>{makeData(); render();};
clear.onclick=()=>{C=[]; labels=Array(X.length).fill(-1); iterCount=0; lastAssigned=false; render();};
random.onclick=()=>{randomInit(); render();};
assign.onclick=()=>{assignStep(); render();};
update.onclick=()=>{updateStep(); render();};
iterate.onclick=()=>fullIter();
makeData(); render();

</script></body></html>
