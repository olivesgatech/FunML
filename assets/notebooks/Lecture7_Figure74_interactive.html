<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Figure 7.4 Interactive</title>
  <script src="plotly-2.35.2.min.js"></script>
  <style>
    body{margin:0;padding:10px 12px;font-family:Segoe UI,Arial,sans-serif}
    .wrap{max-width:980px;margin:0 auto} h3{margin:0 0 8px}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 10px}
    .control{border:1px solid #cfd7e3;border-radius:10px;padding:10px}
    .row{display:flex;gap:10px;align-items:center}.row input{flex:1}.v{min-width:56px;text-align:right;font-weight:700}
    #plot{width:100%;height:520px;border:1px solid #cfd7e3;border-radius:10px}
  </style>
</head>
<body>
<div class="wrap">
  <h3>Figure 7.4: 2D Linear Subspace in 3D</h3>
  <div class="controls">
    <div class="control"><b>v1 = (1, a, 1)</b><div class="row"><input id="a" type="range" min="-1.5" max="1.5" step="0.05" value="1"><span id="av" class="v">1.00</span></div></div>
    <div class="control"><b>v2 = (1, b, 1)</b><div class="row"><input id="b" type="range" min="-1.5" max="1.5" step="0.05" value="-1"><span id="bv" class="v">-1.00</span></div></div>
  </div>
  <div id="plot"></div>
</div>
<script>
function lincomb(v1,v2,s,t){return [s*v1[0]+t*v2[0],s*v1[1]+t*v2[1],s*v1[2]+t*v2[2]]}
function render(){
  const a=Number(document.getElementById('a').value), b=Number(document.getElementById('b').value);
  av.textContent=a.toFixed(2); bv.textContent=b.toFixed(2);
  const v1=[1,a,1], v2=[1,b,1];
  const p1=lincomb(v1,v2,-1,-1), p2=lincomb(v1,v2,1,-1), p3=lincomb(v1,v2,1,1), p4=lincomb(v1,v2,-1,1);
  Plotly.newPlot('plot',[
    {type:'mesh3d',x:[p1[0],p2[0],p3[0],p4[0]],y:[p1[1],p2[1],p3[1],p4[1]],z:[p1[2],p2[2],p3[2],p4[2]],i:[0,0],j:[1,2],k:[2,3],opacity:0.35,color:'#90d5a6',name:'span(v1,v2)'},
    {type:'scatter3d',mode:'lines',x:[0,v1[0]],y:[0,v1[1]],z:[0,v1[2]],line:{color:'green',width:6},name:'x1'},
    {type:'scatter3d',mode:'lines',x:[0,v2[0]],y:[0,v2[1]],z:[0,v2[2]],line:{color:'green',width:6,dash:'dot'},name:'x2'}
  ],{
    scene:{xaxis:{title:'x1',range:[-1.2,2.4]},yaxis:{title:'x2',range:[-2.0,2.0]},zaxis:{title:'x3',range:[-0.2,2.2]}},
    margin:{l:0,r:0,t:30,b:0},showlegend:true
  },{displayModeBar:false,responsive:true});
}
['a','b'].forEach(id=>document.getElementById(id).oninput=render);render();
</script>
</body>
</html>
