<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#fff;--blue:#2563eb;--red:#dc2626;--green:#059669;--gold:#d97706;--purple:#7c3aed}
    html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
    body{padding:14px}
    .wrap{max-width:1240px;margin:0 auto}
    h1{margin:0 0 6px;font-size:24px}
    p{margin:0 0 12px;color:var(--muted)}
    .controls{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:12px 16px;margin:14px 0 16px}
    .control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
    .control label{font-size:14px;font-weight:600}
    .row{display:flex;align-items:center;gap:10px}
    .row input[type=range], .row select{flex:1}
    .value{min-width:56px;text-align:right;font-weight:700}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 16px}
    button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600}
    button:hover{background:var(--bg)}
    .plots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .plots.wide{grid-template-columns:1fr}
    .plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
    .plot{width:100%;height:420px}
    .status{margin-top:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
    table.meta{width:100%;border-collapse:collapse;font-size:14px}
    table.meta th, table.meta td{border:1px solid var(--line);padding:6px 8px;text-align:center}
    @media(max-width:980px){.controls{grid-template-columns:repeat(2,minmax(0,1fr))}.plots{grid-template-columns:1fr}.plot{height:360px}}
  </style>
</head>
<body>
<div class="wrap"><h1>Interactive Mini-batch K-Means (Lecture 11)</h1><p>Compare standard k-means and mini-batch k-means under the same initialization and inspect the speed/accuracy tradeoff.</p><div class="controls"><div class="control"><label>k</label><div class="row"><input id="k" type="range" min="2" max="6" step="1" value="3"><span class="value" id="kv">3</span></div></div><div class="control"><label>batch size</label><div class="row"><input id="b" type="range" min="5" max="80" step="5" value="20"><span class="value" id="bv">20</span></div></div><div class="control"><label>updates</label><div class="row"><input id="t" type="range" min="5" max="80" step="5" value="30"><span class="value" id="tv">30</span></div></div><div class="control"><label>noise</label><div class="row"><input id="noise" type="range" min="0.20" max="1.20" step="0.05" value="0.50"><span class="value" id="noisev">0.50</span></div></div></div><div class="actions"><button id="rerun">Rerun Comparison</button></div><div class="plots"><div class="plot-card"><div id="scatter" class="plot"></div></div><div class="plot-card"><div id="curve" class="plot"></div></div></div><div class="status" id="status"></div></div><script>
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function randn(rng){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function linspace(a,b,n){if(n===1)return[a];const h=(b-a)/(n-1);return Array.from({length:n},(_,i)=>a+i*h)}
function setText(id,text){document.getElementById(id).textContent=text}
function argmin(arr){let bi=0,bv=arr[0];for(let i=1;i<arr.length;i++)if(arr[i]<bv){bv=arr[i];bi=i}return bi}


function blobs(seed, n, noise){
  const rng=mulberry32(seed), base=[[-2,-1.5],[2,-1],[0.2,2.1]], per=Math.floor(n/base.length), X=[];
  for(const c of base){for(let i=0;i<per;i++)X.push([c[0]+noise*randn(rng), c[1]+noise*randn(rng)])}
  while(X.length<n){const c=base[X.length%base.length]; X.push([c[0]+noise*randn(rng), c[1]+noise*randn(rng)])}
  return X;
}
function initFromData(X,K,seed){
  const rng=mulberry32(seed), idx=[...Array(X.length).keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(rng()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]}
  return idx.slice(0,K).map(i=>X[i].slice());
}
function assignAll(X,C){return X.map(p=>argmin(C.map(c=>(p[0]-c[0])**2+(p[1]-c[1])**2)))}
function updateMeans(X,labels,C){
  return C.map((old,j)=>{const pts=X.filter((_,i)=>labels[i]===j); return pts.length?[pts.reduce((s,p)=>s+p[0],0)/pts.length, pts.reduce((s,p)=>s+p[1],0)/pts.length]:old.slice();});
}
function inertia(X,C){const lbl=assignAll(X,C); let s=0; for(let i=0;i<X.length;i++){const c=C[lbl[i]]; s+=(X[i][0]-c[0])**2+(X[i][1]-c[1])**2} return s}
function standardKMeans(X,K,steps,seed){
  let C=initFromData(X,K,seed), hist=[];
  for(let t=0;t<steps;t++){const lbl=assignAll(X,C); C=updateMeans(X,lbl,C); hist.push(inertia(X,C))}
  return {C,labels:assignAll(X,C),hist};
}
function miniBatchKMeans(X,K,batch,steps,seed){
  const rng=mulberry32(seed+77); let C=initFromData(X,K,seed), counts=Array(K).fill(0), hist=[];
  for(let t=0;t<steps;t++){
    const batchPts=[]; for(let i=0;i<batch;i++) batchPts.push(X[Math.floor(rng()*X.length)]);
    const lbl=batchPts.map(p=>argmin(C.map(c=>(p[0]-c[0])**2+(p[1]-c[1])**2)));
    for(let i=0;i<batchPts.length;i++){const j=lbl[i]; counts[j]+=1; const eta=1/counts[j]; C[j]=[(1-eta)*C[j][0]+eta*batchPts[i][0], (1-eta)*C[j][1]+eta*batchPts[i][1]]}
    hist.push(inertia(X,C));
  }
  return {C,labels:assignAll(X,C),hist};
}
function render(){
  setText('kv', k.value); setText('bv', b.value); setText('tv', t.value); setText('noisev', (+noise.value).toFixed(2));
  const X=blobs(5, 240, +noise.value), K=+k.value, steps=+t.value, batch=+b.value;
  const full=standardKMeans(X,K,steps,9), mini=miniBatchKMeans(X,K,batch,steps,9);
  Plotly.newPlot('scatter',[
    {x:X.map(p=>p[0]), y:X.map(p=>p[1]), mode:'markers', name:'standard k-means', marker:{size:7,color:full.labels,colorscale:'Turbo',opacity:0.78}},
    {x:full.C.map(p=>p[0]), y:full.C.map(p=>p[1]), mode:'markers', name:'standard centroids', marker:{size:15,color:'black',symbol:'x'}},
    {x:mini.C.map(p=>p[0]), y:mini.C.map(p=>p[1]), mode:'markers', name:'mini-batch centroids', marker:{size:13,color:'#dc2626',symbol:'diamond'}}
  ], {title:'Final centroids: standard vs mini-batch', margin:{t:44,l:44,r:12,b:40}, xaxis:{scaleanchor:'y'}}, {displayModeBar:false,responsive:true});
  Plotly.newPlot('curve',[
    {x:[...Array(steps).keys()].map(i=>i+1), y:full.hist, mode:'lines+markers', name:'standard inertia', line:{color:'#2563eb',width:3}},
    {x:[...Array(steps).keys()].map(i=>i+1), y:mini.hist, mode:'lines+markers', name:'mini-batch inertia', line:{color:'#dc2626',width:3}}
  ], {title:'Optimization tradeoff', margin:{t:44,l:44,r:12,b:40}, xaxis:{title:'update'}, yaxis:{title:'full-dataset inertia'}}, {displayModeBar:false,responsive:true});
  const costFull = X.length * K * steps, costMini = batch * K * steps;
  document.getElementById('status').textContent =
    `Standard distance evaluations (proxy): ${costFull}\nMini-batch distance evaluations (proxy): ${costMini}\nMini-batch reaches similar structure with much cheaper updates, but the path is noisier.`;
}
['k','b','t','noise'].forEach(id=>document.getElementById(id).addEventListener('input', render));
rerun.onclick=()=>render();
render();

</script></body></html>
