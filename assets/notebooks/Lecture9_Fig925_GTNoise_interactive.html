<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root{--bg:#f8fafc;--ink:#0f172a;--muted:#475569;--line:#cbd5e1;--panel:#fff}
    html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
    body{padding:14px}
    .wrap{max-width:1100px;margin:0 auto}
    h1{margin:0 0 6px;font-size:24px}
    p{margin:0 0 12px;color:var(--muted)}
    .controls{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px 16px;margin:14px 0 16px}
    .control{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
    .control label{font-size:14px;font-weight:600}
    .row{display:flex;align-items:center;gap:10px}
    .row input[type=range]{flex:1}
    .value{min-width:64px;text-align:right;font-weight:700}
    .plot-card{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden}
    .plot{width:100%;height:560px}
    .status{margin-top:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg);font-size:14px;line-height:1.5;white-space:pre-wrap}
    @media(max-width:980px){
      .controls{grid-template-columns:1fr}
      .plot{height:420px}
    }
  </style>
</head>
<body>
<div class="wrap"><h1>Figure 9.25: Measured vs True Accuracy Under Label Noise</h1><p>Observed accuracy can underestimate true model performance when labels are noisy.</p><div class="controls"><div class="control"><label>Label noise ε</label><div class="row"><input id="eps" type="range" min="0.00" max="0.45" step="0.01" value="0.10"><span class="value" id="epsv">0.10</span></div></div><div class="control"><label>Observed accuracy A_model</label><div class="row"><input id="obs" type="range" min="0.00" max="1.00" step="0.01" value="0.90"><span class="value" id="obsv">0.90</span></div></div></div><div class="plot-card"><div id="main" class="plot"></div></div><div class="status" id="status"></div></div><script>
function linspace(a,b,n){if(n===1)return[a];const step=(b-a)/(n-1);return Array.from({length:n},(_,i)=>a+i*step)}
function clip01(v){return Math.max(0,Math.min(1,v))}
function setValue(id, text){document.getElementById(id).textContent=text}
function uncorrelatedTrue(obs, eps){
  if(eps >= 0.5) return NaN;
  return clip01((obs - eps) / (1 - 2*eps));
}
function render(){
  const eps=+epsEl.value, obs=+obsEl.value;
  setValue('epsv', eps.toFixed(2));
  setValue('obsv', obs.toFixed(2));
  const x=linspace(0,1,401);
  const lower=x.map(v=>clip01(v-eps));
  const upper=x.map(v=>clip01(v+eps));
  const uncorr=x.map(v=>uncorrelatedTrue(v, eps));
  const lowerObs=clip01(obs-eps);
  const upperObs=clip01(obs+eps);
  const pointUncorr=uncorrelatedTrue(obs, eps);
  const traces=[
    {
      x:x.concat([...x].reverse()),
      y:upper.concat([...lower].reverse()),
      type:'scatter',
      fill:'toself',
      fillcolor:'rgba(156,163,175,0.55)',
      line:{color:'rgba(0,0,0,0)'},
      name:'A_true range',
      hoverinfo:'skip'
    },
    {
      x:x,
      y:x,
      mode:'lines',
      name:'1:1 line',
      line:{color:'#6b7280',dash:'dash',width:1.5}
    },
    {
      x:x,
      y:uncorr,
      mode:'lines',
      name:'A_true (uncorrelated errors)',
      line:{color:'#111827',width:2}
    },
    {
      x:[obs, obs],
      y:[lowerObs, upperObs],
      mode:'lines',
      name:'current range',
      line:{color:'#dc2626',width:4}
    },
    {
      x:[obs],
      y:[obs],
      mode:'markers',
      name:'observed accuracy',
      marker:{color:'#2563eb',size:9}
    }
  ];
  if(Number.isFinite(pointUncorr)){
    traces.push({
      x:[obs],
      y:[pointUncorr],
      mode:'markers',
      name:'uncorrelated estimate',
      marker:{color:'#111827',size:9,symbol:'diamond'}
    });
  }
  Plotly.newPlot('main', traces, {
    title:'Measured vs true accuracy under label noise',
    margin:{t:48,l:58,r:18,b:52},
    xaxis:{title:'A_model',range:[0,1]},
    yaxis:{title:'A_true',range:[0,1]},
    legend:{x:0.02,y:0.02,xanchor:'left',yanchor:'bottom'},
    paper_bgcolor:'#ffffff',
    plot_bgcolor:'#ffffff'
  }, {displayModeBar:false,responsive:true});
  const ceiling=(1-eps).toFixed(3);
  const rangeText=`[${lowerObs.toFixed(3)}, ${upperObs.toFixed(3)}]`;
  const uncorrText=Number.isFinite(pointUncorr) ? pointUncorr.toFixed(3) : 'undefined';
  document.getElementById('status').textContent=`Observed accuracy ceiling for a perfect model: ${ceiling}\nFor observed accuracy ${obs.toFixed(3)}, plausible true accuracy range: ${rangeText}\nIf label errors are random and uncorrelated, implied true accuracy: ${uncorrText}`;
}
const epsEl=document.getElementById('eps'), obsEl=document.getElementById('obs');
['eps','obs'].forEach(id=>document.getElementById(id).addEventListener('input', render));
render();
</script></body></html>
