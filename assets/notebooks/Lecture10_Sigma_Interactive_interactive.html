<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Interactive Sigma Control (Lecture 10)</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root{
      --bg:#f8fafc;
      --ink:#0f172a;
      --muted:#475569;
      --line:#cbd5e1;
      --panel:#ffffff;
      --accent:#2563eb;
      --query:#dc2626;
    }
    html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
    body{padding:14px}
    .wrap{max-width:1280px;margin:0 auto}
    h1{margin:0 0 8px;font-size:24px}
    p{margin:0 0 14px;color:var(--muted)}
    .controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
    .control{
      border:1px solid var(--line);
      border-radius:14px;
      background:linear-gradient(180deg,#fff 0%,var(--bg) 100%);
      padding:12px;
    }
    .control h2{margin:0 0 10px;font-size:15px}
    .slider{display:grid;gap:6px;margin-bottom:8px}
    .slider label{font-size:13px;color:var(--muted)}
    .row{display:flex;align-items:center;gap:10px}
    .row input[type=range]{flex:1}
    .value{min-width:54px;text-align:right;font-weight:700}
    .plots{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .plot-card{
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--panel);
      overflow:hidden;
    }
    .plot{height:460px}
    .status{
      margin-top:14px;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--bg);
      font-size:14px;
      line-height:1.55;
      white-space:pre-wrap;
    }
    .actions{display:flex;gap:10px;margin-bottom:16px}
    button{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:8px 14px;
      cursor:pointer;
      font-size:13px;
      font-weight:600;
    }
    button:hover{background:var(--bg)}
    @media (max-width: 1100px){
      .controls{grid-template-columns:repeat(2,minmax(0,1fr))}
      .plots{grid-template-columns:1fr}
      .plot{height:380px}
    }
    @media (max-width: 720px){
      .controls{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive Sigma Control (Lecture 10)</h1>
    <p>Move the four points with sliders and vary covariance Sigma for Euclidean vs Mahalanobis comparison.</p>

    <div class="controls">
      <div class="control">
        <h2>x1</h2>
        <div class="slider">
          <label>x</label>
          <div class="row"><input id="p1x" type="range" min="-4" max="4" step="0.1" value="0"><span id="p1xv" class="value">0.0</span></div>
        </div>
        <div class="slider">
          <label>y</label>
          <div class="row"><input id="p1y" type="range" min="-4" max="4" step="0.1" value="0"><span id="p1yv" class="value">0.0</span></div>
        </div>
      </div>
      <div class="control">
        <h2>x2</h2>
        <div class="slider">
          <label>x</label>
          <div class="row"><input id="p2x" type="range" min="-4" max="4" step="0.1" value="1"><span id="p2xv" class="value">1.0</span></div>
        </div>
        <div class="slider">
          <label>y</label>
          <div class="row"><input id="p2y" type="range" min="-4" max="4" step="0.1" value="1"><span id="p2yv" class="value">1.0</span></div>
        </div>
      </div>
      <div class="control">
        <h2>x3</h2>
        <div class="slider">
          <label>x</label>
          <div class="row"><input id="p3x" type="range" min="-4" max="4" step="0.1" value="2"><span id="p3xv" class="value">2.0</span></div>
        </div>
        <div class="slider">
          <label>y</label>
          <div class="row"><input id="p3y" type="range" min="-4" max="4" step="0.1" value="0.5"><span id="p3yv" class="value">0.5</span></div>
        </div>
      </div>
      <div class="control">
        <h2>x4</h2>
        <div class="slider">
          <label>x</label>
          <div class="row"><input id="p4x" type="range" min="-4" max="4" step="0.1" value="-1"><span id="p4xv" class="value">-1.0</span></div>
        </div>
        <div class="slider">
          <label>y</label>
          <div class="row"><input id="p4y" type="range" min="-4" max="4" step="0.1" value="1.6"><span id="p4yv" class="value">1.6</span></div>
        </div>
      </div>
      <div class="control">
        <h2>Sigma</h2>
        <div class="slider">
          <label>sigma_x</label>
          <div class="row"><input id="sx" type="range" min="0.2" max="3" step="0.1" value="1"><span id="sxv" class="value">1.0</span></div>
        </div>
        <div class="slider">
          <label>sigma_y</label>
          <div class="row"><input id="sy" type="range" min="0.2" max="3" step="0.1" value="1"><span id="syv" class="value">1.0</span></div>
        </div>
        <div class="slider">
          <label>rho</label>
          <div class="row"><input id="rho" type="range" min="-0.95" max="0.95" step="0.05" value="0"><span id="rhov" class="value">0.00</span></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="reset" type="button">Reset default points</button>
    </div>

    <div class="plots">
      <div class="plot-card"><div id="p" class="plot"></div></div>
      <div class="plot-card"><div id="tbl" class="plot"></div></div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    const pointIds = [
      ['p1x', 'p1y'],
      ['p2x', 'p2y'],
      ['p3x', 'p3y'],
      ['p4x', 'p4y']
    ];
    const defaults = [
      [0, 0],
      [1, 1],
      [2, 0.5],
      [-1, 1.6]
    ];

    function eig2(a, b, c) {
      const tr = a + c;
      const det = a * c - b * b;
      const disc = Math.sqrt(Math.max(tr * tr - 4 * det, 0));
      return [(tr + disc) / 2, (tr - disc) / 2];
    }

    function getPoints() {
      return pointIds.map(([xid, yid]) => [
        Number(document.getElementById(xid).value),
        Number(document.getElementById(yid).value)
      ]);
    }

    function updateValue(id, digits) {
      document.getElementById(id + 'v').textContent = Number(document.getElementById(id).value).toFixed(digits);
    }

    function render() {
      pointIds.flat().forEach(id => updateValue(id, 1));
      updateValue('sx', 1);
      updateValue('sy', 1);
      updateValue('rho', 2);

      const pts = getPoints();
      const q = [0, 0];
      const sx = Number(document.getElementById('sx').value);
      const sy = Number(document.getElementById('sy').value);
      const rho = Number(document.getElementById('rho').value);
      const cov = [[sx * sx, rho * sx * sy], [rho * sx * sy, sy * sy]];
      const det = cov[0][0] * cov[1][1] - cov[0][1] * cov[1][0] || 1e-9;
      const inv = [[cov[1][1] / det, -cov[0][1] / det], [-cov[1][0] / det, cov[0][0] / det]];

      const de = [];
      const dm = [];
      for (const p of pts) {
        const dx = p[0] - q[0];
        const dy = p[1] - q[1];
        de.push(Math.hypot(dx, dy));
        dm.push(Math.sqrt(dx * (inv[0][0] * dx + inv[0][1] * dy) + dy * (inv[1][0] * dx + inv[1][1] * dy)));
      }

      const xs = pts.map(p => p[0]);
      const ys = pts.map(p => p[1]);
      const t = [...Array(240)].map((_, i) => 2 * Math.PI * i / 239);
      const [l1, l2] = eig2(cov[0][0], cov[0][1], cov[1][1]);
      const ang = 0.5 * Math.atan2(2 * cov[0][1], cov[0][0] - cov[1][1]);
      const ex = t.map(tt => Math.sqrt(Math.max(l1, 1e-9)) * Math.cos(tt));
      const ey = t.map(tt => Math.sqrt(Math.max(l2, 1e-9)) * Math.sin(tt));
      const elx = ex.map((u, i) => u * Math.cos(ang) - ey[i] * Math.sin(ang));
      const ely = ex.map((u, i) => u * Math.sin(ang) + ey[i] * Math.cos(ang));

      Plotly.newPlot('p', [
        {
          x: xs,
          y: ys,
          mode: 'markers+text',
          text: pts.map((_, i) => 'x' + (i + 1)),
          textposition: 'top center',
          marker: { size: 10, color: '#2563eb' },
          name: 'points'
        },
        {
          x: [0],
          y: [0],
          mode: 'markers',
          marker: { size: 14, color: '#dc2626', symbol: 'x' },
          name: 'query'
        },
        {
          x: elx,
          y: ely,
          mode: 'lines',
          line: { dash: 'dash', color: 'black' },
          name: '1-sigma'
        }
      ], {
        title: 'Sigma effect on distances',
        xaxis: { scaleanchor: 'y' },
        margin: { l: 50, r: 20, t: 45, b: 45 }
      }, { displayModeBar: false, responsive: true });

      Plotly.newPlot('tbl', [{
        type: 'table',
        header: { values: ['Point', 'Euclidean', 'Mahalanobis'] },
        cells: {
          values: [
            pts.map((_, i) => 'x' + (i + 1)),
            de.map(v => v.toFixed(3)),
            dm.map(v => v.toFixed(3))
          ]
        }
      }], {
        title: 'Distance table',
        margin: { l: 10, r: 10, t: 45, b: 10 }
      }, { displayModeBar: false, responsive: true });

      document.getElementById('status').textContent =
        'Query point fixed at (0,0). Move the four points with sliders and adjust Sigma to compare Euclidean and Mahalanobis distances.';
    }

    document.getElementById('reset').addEventListener('click', () => {
      defaults.forEach((pair, idx) => {
        document.getElementById(pointIds[idx][0]).value = pair[0];
        document.getElementById(pointIds[idx][1]).value = pair[1];
      });
      render();
    });

    [...pointIds.flat(), 'sx', 'sy', 'rho'].forEach(id => {
      document.getElementById(id).addEventListener('input', render);
    });

    render();
  </script>
</body>
</html>
