<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Figure 8.6: Mini-batch Gradient Descent</title>
  <script src="plotly-2.35.2.min.js"></script>
  <style>
    :root { --bg:#f8fafc; --ink:#0f172a; --muted:#475569; --line:#cbd5e1; --panel:#fff; }
    html, body { margin:0; padding:0; background:#fff; color:var(--ink); font-family:"Segoe UI", Arial, sans-serif; }
    body { padding:14px; }
    .wrap { max-width:1200px; margin:0 auto; }
    h1 { margin:0 0 8px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .controls { display:grid; grid-template-columns:repeat(4,minmax(180px,1fr)); gap:12px 16px; margin:14px 0 16px; }
    .control { display:grid; gap:6px; padding:12px; border:1px solid var(--line); border-radius:12px; background:linear-gradient(180deg,#fff 0%,var(--bg) 100%); }
    .control label { font-size:14px; font-weight:600; }
    .row { display:flex; align-items:center; gap:10px; }
    .row input[type=range] { flex:1; }
    .value { min-width:56px; text-align:right; font-weight:700; }
    .plots { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; }
    .plot-card { border:1px solid var(--line); border-radius:14px; background:var(--panel); overflow:hidden; }
    .plot { width:100%; height:460px; }
    .status { margin-top:14px; padding:12px 14px; border:1px solid var(--line); border-radius:12px; background:var(--bg); font-size:14px; line-height:1.5; white-space:pre-wrap; }
    @media(max-width:980px){ .controls{grid-template-columns:repeat(2,minmax(0,1fr))} .plots{grid-template-columns:1fr} .plot{height:380px} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive Mini-batch Gradient Descent (Lecture 8)</h1>
    <p>Lecture-consistent Mini-batch GD for linear regression with shuffled mini-batches, a matching fit, contour trajectory, and full-batch MSE trace.</p>

    <div class="controls">
      <div class="control"><label>Noise</label><div class="row"><input id="noise" type="range" min="0.05" max="1.0" step="0.05" value="0.25" /><span class="value" id="noisev">0.25</span></div></div>
      <div class="control"><label>alpha</label><div class="row"><input id="alpha" type="range" min="0.001" max="0.3" step="0.001" value="0.05" /><span class="value" id="alphav">0.050</span></div></div>
      <div class="control"><label>batch size</label><div class="row"><input id="batch" type="range" min="2" max="40" step="1" value="8" /><span class="value" id="batchv">8</span></div></div>
      <div class="control"><label>max iter</label><div class="row"><input id="iter" type="range" min="1" max="200" step="1" value="10" /><span class="value" id="iterv">10</span></div></div>
    </div>

    <div class="plots">
      <div class="plot-card"><div id="pfit" class="plot"></div></div>
      <div class="plot-card"><div id="cont" class="plot"></div></div>
      <div class="plot-card"><div id="prog" class="plot"></div></div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const METHOD = 'mini';
    const METHOD_LABEL = 'Mini-batch GD';

    function makeRng(seed) {
      let state = seed >>> 0;
      return function rand() {
        state = (1664525 * state + 1013904223) >>> 0;
        return state / 4294967296;
      };
    }

    function shuffledIndices(n, rand) {
      const idx = Array.from({ length: n }, (_, i) => i);
      for (let i = n - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [idx[i], idx[j]] = [idx[j], idx[i]];
      }
      return idx;
    }

    function solveLinearFit(x, y) {
      const n = x.length;
      let sx = 0, sy = 0, sxx = 0, sxy = 0;
      for (let i = 0; i < n; i++) {
        sx += x[i];
        sy += y[i];
        sxx += x[i] * x[i];
        sxy += x[i] * y[i];
      }
      const det = n * sxx - sx * sx;
      if (Math.abs(det) < 1e-12) return [0, 0];
      return [(sxx * sy - sx * sxy) / det, (n * sxy - sx * sy) / det];
    }

    function predictLine(theta, xs) {
      return xs.map(v => theta[0] + theta[1] * v);
    }

    function mse(theta, x, y) {
      let total = 0;
      for (let i = 0; i < x.length; i++) {
        const e = theta[0] + theta[1] * x[i] - y[i];
        total += e * e;
      }
      return total / x.length;
    }

    function gradient(theta, idx, x, y) {
      let g0 = 0, g1 = 0;
      for (const i of idx) {
        const e = theta[0] + theta[1] * x[i] - y[i];
        g0 += 2 * e;
        g1 += 2 * e * x[i];
      }
      const scale = 1 / Math.max(1, idx.length);
      return [g0 * scale, g1 * scale];
    }

    function optimize(method, x, y, alpha, steps, batchSize) {
      const theta = [-1.8, 2.4];
      const pathx = [theta[0]];
      const pathy = [theta[1]];
      const mses = [];
      const rand = makeRng(7);
      let order = [];
      let ptr = 0;

      const refill = () => {
        order = shuffledIndices(x.length, rand);
        ptr = 0;
      };

      if (method !== 'batch') refill();

      for (let step = 0; step < steps; step++) {
        let idx;
        if (method === 'batch') {
          idx = Array.from({ length: x.length }, (_, i) => i);
        } else if (method === 'sgd') {
          if (ptr >= order.length) refill();
          idx = [order[ptr]];
          ptr += 1;
        } else {
          if (ptr >= order.length) refill();
          const end = Math.min(ptr + Math.max(1, batchSize), order.length);
          idx = order.slice(ptr, end);
          ptr = end;
        }
        const [g0, g1] = gradient(theta, idx, x, y);
        theta[0] -= alpha * g0;
        theta[1] -= alpha * g1;
        pathx.push(theta[0]);
        pathy.push(theta[1]);
        mses.push(mse(theta, x, y));
      }

      return { theta, pathx, pathy, mses };
    }

    const N = 40;
    const x = [...Array(N)].map((_, i) => -2.3 + 4.6 * i / (N - 1));
    const noiseBase = x.map((_, i) => Math.sin((i + 1) * 2.137) + 0.3 * Math.cos((i + 1) * 0.917));

    const noiseEl = document.getElementById('noise');
    const alphaEl = document.getElementById('alpha');
    const batchEl = document.getElementById('batch');
    const iterEl = document.getElementById('iter');
    const noisev = document.getElementById('noisev');
    const alphav = document.getElementById('alphav');
    const batchv = document.getElementById('batchv');
    const iterv = document.getElementById('iterv');
    const status = document.getElementById('status');

    function render() {
      const noise = +noiseEl.value, alpha = +alphaEl.value, batchSize = +batchEl.value, maxi = +iterEl.value;
      noisev.textContent = noise.toFixed(2); alphav.textContent = alpha.toFixed(3); batchv.textContent = String(batchSize); iterv.textContent = String(maxi);
      const y = x.map((v, i) => 1.2 + 0.8 * v - 0.6 * v * v + noise * noiseBase[i]);
      const thetaStar = solveLinearFit(x, y);
      const result = optimize(METHOD, x, y, alpha, maxi, batchSize);
      const xg = [...Array(300)].map((_, i) => -2.3 + 4.6 * i / 299);
      const yStar = predictLine(thetaStar, xg);
      const yFit = predictLine(result.theta, xg);

      Plotly.newPlot('pfit', [
        { x, y, mode: 'markers', name: 'data', marker: { color: '#1f77b4', size: 7 } },
        { x: xg, y: yStar, mode: 'lines', name: 'least-squares line', line: { color: '#0f766e', dash: 'dash' } },
        { x: xg, y: yFit, mode: 'lines', name: `${METHOD_LABEL} fit`, line: { color: '#dc2626', width: 3 } }
      ], {
        title: `${METHOD_LABEL}: linear regression fit`,
        xaxis: { title: 'x', range: [-2.5, 2.5], autorange: false },
        yaxis: { title: 'y', range: [-4.5, 3.5], autorange: false }
      }, { displayModeBar: false });

      const theta0Vals = result.pathx.concat([thetaStar[0]]);
      const theta1Vals = result.pathy.concat([thetaStar[1]]);
      const t0Min = Math.min(...theta0Vals) - 1.0;
      const t0Max = Math.max(...theta0Vals) + 1.0;
      const t1Min = Math.min(...theta1Vals) - 1.0;
      const t1Max = Math.max(...theta1Vals) + 1.0;
      const t0 = [...Array(70)].map((_, i) => t0Min + (t0Max - t0Min) * i / 69);
      const t1 = [...Array(70)].map((_, i) => t1Min + (t1Max - t1Min) * i / 69);
      const z = [];
      for (const theta1 of t1) {
        const row = [];
        for (const theta0 of t0) {
          row.push(mse([theta0, theta1], x, y));
        }
        z.push(row);
      }

      Plotly.newPlot('cont', [
        { z, x: t0, y: t1, type: 'contour', showscale: false, colorscale: 'Viridis' },
        { x: result.pathx, y: result.pathy, mode: 'lines+markers', marker: { size: 4 }, line: { color: '#ef4444' }, name: 'trajectory' },
        { x: [thetaStar[0]], y: [thetaStar[1]], mode: 'markers', marker: { color: '#111827', size: 10, symbol: 'x' }, name: 'least-squares solution' }
      ], { title: 'MSE contour + trajectory', xaxis: { title: 'theta0' }, yaxis: { title: 'theta1' } }, { displayModeBar: false });

      Plotly.newPlot('prog', [
        { x: [...Array(result.mses.length)].map((_, i) => i + 1), y: result.mses, mode: 'lines', line: { color: '#111' }, name: 'MSE' }
      ], { title: 'Optimization progress (full-batch MSE)', xaxis: { title: 'iteration' }, yaxis: { title: 'MSE' } }, { displayModeBar: false });

      status.textContent =
        `method=${METHOD} | batch_size=${batchSize} | alpha=${alpha.toFixed(3)} | max_iter=${maxi}\n` +
        `final theta=(${result.theta[0].toFixed(3)}, ${result.theta[1].toFixed(3)})\n` +
        `least-squares theta=(${thetaStar[0].toFixed(3)}, ${thetaStar[1].toFixed(3)})\n` +
        `final full-batch MSE=${mse(result.theta, x, y).toFixed(3)}`;
    }

    ['noise', 'alpha', 'batch', 'iter'].forEach(id => document.getElementById(id).addEventListener('input', render));
    render();
  </script>
</body>
</html>
