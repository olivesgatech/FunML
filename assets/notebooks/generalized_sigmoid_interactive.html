<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Generalized Sigmoid Function</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --ink: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --panel: #ffffff;
      --accent: #2563eb;
      --accent-2: #dc2626;
      --accent-3: #f59e0b;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    body {
      padding: 14px;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 12px 16px;
      margin: 14px 0 16px;
    }
    .control {
      display: grid;
      gap: 6px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }
    .control label {
      font-size: 14px;
      font-weight: 600;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control input[type="range"] {
      flex: 1;
    }
    .value {
      min-width: 56px;
      text-align: right;
      font-weight: 700;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 16px;
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    button:hover {
      background: var(--bg);
    }
    .plots {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
      gap: 16px;
    }
    .plot-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      overflow: hidden;
    }
    .plot {
      width: 100%;
      height: 480px;
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      font-size: 14px;
    }
    code {
      background: #eef2ff;
      padding: 2px 5px;
      border-radius: 4px;
    }
    @media (max-width: 960px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .plots {
        grid-template-columns: 1fr;
      }
      .plot {
        height: 380px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Interactive Generalized Sigmoid Function</h1>
    <p>Adjust <code>a</code>, <code>b</code>, and <code>x0</code> in <code>a / (1 + e^(-b(x - x0)))</code> to see how vertical scale, slope, and midpoint change the curve.</p>

    <div class="controls">
      <div class="control">
        <label for="aRange">Scale a</label>
        <div class="control-row">
          <input id="aRange" type="range" min="0.2" max="3.0" step="0.1" value="1.0">
          <span class="value" id="aValue">1.0</span>
        </div>
      </div>
      <div class="control">
        <label for="bRange">Slope b</label>
        <div class="control-row">
          <input id="bRange" type="range" min="0.2" max="5.0" step="0.1" value="1.0">
          <span class="value" id="bValue">1.0</span>
        </div>
      </div>
      <div class="control">
        <label for="x0Range">Shift x0</label>
        <div class="control-row">
          <input id="x0Range" type="range" min="-6.0" max="6.0" step="0.5" value="0.0">
          <span class="value" id="x0Value">0.0</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="referenceButton" type="button">Use reference curve</button>
      <button id="wideButton" type="button">Make it wider</button>
      <button id="steepButton" type="button">Make it steeper</button>
      <button id="resetButton" type="button">Reset demo</button>
    </div>

    <div class="plots">
      <div class="plot-card"><div class="plot" id="mainPlot"></div></div>
      <div class="plot-card"><div class="plot" id="comparisonPlot"></div></div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const aRange = document.getElementById("aRange");
    const bRange = document.getElementById("bRange");
    const x0Range = document.getElementById("x0Range");
    const aValue = document.getElementById("aValue");
    const bValue = document.getElementById("bValue");
    const x0Value = document.getElementById("x0Value");
    const status = document.getElementById("status");
    const referenceButton = document.getElementById("referenceButton");
    const wideButton = document.getElementById("wideButton");
    const steepButton = document.getElementById("steepButton");
    const resetButton = document.getElementById("resetButton");

    const xValues = Array.from({ length: 400 }, (_, i) => -10 + (20 * i) / 399);
    let mainInitialized = false;
    let comparisonInitialized = false;

    function generalizedSigmoid(x, a, b, x0) {
      return a / (1 + Math.exp(-b * (x - x0)));
    }

    function format(value) {
      return Number(value).toFixed(1);
    }

    function updatePlots() {
      const a = Number(aRange.value);
      const b = Number(bRange.value);
      const x0 = Number(x0Range.value);

      aValue.textContent = format(a);
      bValue.textContent = format(b);
      x0Value.textContent = format(x0);

      const currentY = xValues.map((x) => generalizedSigmoid(x, a, b, x0));
      const referenceY = xValues.map((x) => generalizedSigmoid(x, 1, 1, 0));
      const flatterY = xValues.map((x) => generalizedSigmoid(x, a, Math.max(0.2, b / 2), x0));
      const steeperY = xValues.map((x) => generalizedSigmoid(x, a, Math.min(5.0, b * 2), x0));

      const mainData = [
        {
          x: xValues,
          y: currentY,
          mode: "lines",
          type: "scatter",
          name: `current (a=${format(a)}, b=${format(b)}, x0=${format(x0)})`,
          line: { color: "#2563eb", width: 4 }
        },
        {
          x: xValues,
          y: referenceY,
          mode: "lines",
          type: "scatter",
          name: "reference (a=1.0, b=1.0, x0=0.0)",
          line: { color: "#94a3b8", width: 2, dash: "dash" }
        },
        {
          x: [x0],
          y: [a / 2],
          mode: "markers",
          type: "scatter",
          name: "midpoint",
          marker: { color: "#f59e0b", size: 10 }
        }
      ];

      const mainLayout = {
        title: { text: "Generalized Sigmoid", font: { size: 18 } },
        margin: { l: 58, r: 24, t: 48, b: 48 },
        paper_bgcolor: "#ffffff",
        plot_bgcolor: "#ffffff",
        xaxis: {
          title: "x",
          range: [-10, 10],
          zeroline: true,
          gridcolor: "#e2e8f0"
        },
        yaxis: {
          title: "y",
          range: [-0.1, 3.2],
          zeroline: true,
          gridcolor: "#e2e8f0"
        },
        shapes: [
          {
            type: "line",
            x0,
            x1: x0,
            y0: -0.1,
            y1: 3.2,
            line: { color: "#f59e0b", width: 2, dash: "dot" }
          }
        ],
        annotations: [
          {
            x: 0.03,
            y: 0.98,
            xref: "paper",
            yref: "paper",
            xanchor: "left",
            yanchor: "top",
            showarrow: false,
            bgcolor: "rgba(255,255,255,0.85)",
            bordercolor: "#cbd5e1",
            text: "f(x) = a / (1 + e^(-b(x - x0)))"
          }
        ],
        legend: {
          orientation: "h",
          x: 0,
          y: -0.18
        }
      };

      const comparisonData = [
        {
          x: xValues,
          y: flatterY,
          mode: "lines",
          type: "scatter",
          name: `b/2 = ${format(Math.max(0.2, b / 2))}`,
          line: { color: "#0f766e", width: 2 }
        },
        {
          x: xValues,
          y: currentY,
          mode: "lines",
          type: "scatter",
          name: `current b = ${format(b)}`,
          line: { color: "#2563eb", width: 4 }
        },
        {
          x: xValues,
          y: steeperY,
          mode: "lines",
          type: "scatter",
          name: `2b = ${format(Math.min(5.0, b * 2))}`,
          line: { color: "#dc2626", width: 2 }
        }
      ];

      const comparisonLayout = {
        title: { text: "Slope Comparison", font: { size: 18 } },
        margin: { l: 58, r: 20, t: 48, b: 48 },
        paper_bgcolor: "#ffffff",
        plot_bgcolor: "#ffffff",
        xaxis: {
          title: "x",
          range: [-10, 10],
          zeroline: true,
          gridcolor: "#e2e8f0"
        },
        yaxis: {
          title: "y",
          range: [-0.1, 3.2],
          zeroline: true,
          gridcolor: "#e2e8f0"
        },
        legend: {
          orientation: "h",
          x: 0,
          y: -0.18
        }
      };

      const config = { responsive: true, displayModeBar: false };

      if (!mainInitialized) {
        Plotly.newPlot("mainPlot", mainData, mainLayout, config);
        mainInitialized = true;
      } else {
        Plotly.react("mainPlot", mainData, mainLayout, config);
      }

      if (!comparisonInitialized) {
        Plotly.newPlot("comparisonPlot", comparisonData, comparisonLayout, config);
        comparisonInitialized = true;
      } else {
        Plotly.react("comparisonPlot", comparisonData, comparisonLayout, config);
      }

      const halfHeight = format(a / 2);
      status.innerHTML = `Current midpoint: <code>x = ${format(x0)}</code>, <code>y = ${halfHeight}</code>. Increasing <code>a</code> raises the top plateau, increasing <code>b</code> makes the transition steeper, and changing <code>x0</code> shifts the curve horizontally.`;
    }

    function setState(a, b, x0) {
      aRange.value = a.toFixed(1);
      bRange.value = b.toFixed(1);
      x0Range.value = x0.toFixed(1);
      updatePlots();
    }

    [aRange, bRange, x0Range].forEach((input) => {
      input.addEventListener("input", updatePlots);
    });

    referenceButton.addEventListener("click", () => setState(1.0, 1.0, 0.0));
    wideButton.addEventListener("click", () => setState(1.0, 0.5, 0.0));
    steepButton.addEventListener("click", () => setState(1.0, 3.0, 0.0));
    resetButton.addEventListener("click", () => setState(1.0, 1.0, 0.0));

    updatePlots();
  </script>
</body>
</html>
